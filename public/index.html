<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAU Dashboard</title>

<style>
body{margin:0;font-family:sans-serif;background:#f8fafc}

/* HEADER */
header{
  padding:16px;
  background:#fff;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:16px;
  padding:10px;
}

.card{
  background:#fff;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

.card-title{font-size:12px;color:#666}
.card-value{font-size:22px;font-weight:bold}

.change-up{color:green}
.change-down{color:red}

/* FLOAT BUTTON */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#3b82f6;
  color:white;
  font-size:22px;
  border:none;
  display:none;
}

/* MOBILE */
@media(max-width:600px){
  header button{display:none}
  #fab{display:block}

  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  .card-value{font-size:18px}
}
</style>
</head>

<body>

<header>
  <div>📊 XAU Dashboard</div>
  <button onclick="load()">Update</button>
</header>

<div class="grid">
  <div class="card"><div class="card-title">USD</div><div id="usd">--</div></div>
  <div class="card"><div class="card-title">XAU</div><div id="xau">--</div></div>
  <div class="card"><div class="card-title">SJC</div><div id="sjc">--</div></div>
  <div class="card"><div class="card-title">Gap</div><div id="diff">--</div></div>
  <div class="card"><div class="card-title">%</div><div id="percent">--</div></div>
</div>

<h3 style="padding:10px;">History</h3>
<div style="padding:10px">
  <button onclick="clearHistory()">Clear</button>
  <ul id="history"></ul>
</div>

<button id="fab" onclick="load()">🔄</button>

<script>
const API="/api/gold";

const el={
  usd:document.getElementById("usd"),
  xau:document.getElementById("xau"),
  sjc:document.getElementById("sjc"),
  diff:document.getElementById("diff"),
  percent:document.getElementById("percent"),
  history:document.getElementById("history")
};

let historyData=[];

/* RENDER */
function render(d){
  el.usd.innerText=d.usd;
  el.xau.innerText=d.xau.toFixed(1);
  el.diff.innerText=d.diff;
  el.percent.innerText=d.percent;

  const morning=localStorage.getItem("sjc")||d.sjc;
  localStorage.setItem("sjc",morning);

  const change=d.sjc-morning;

  el.sjc.innerHTML=`
    <div>${d.sjc}</div>
    <div class="${change>=0?'change-up':'change-down'}">
      ${change>=0?'▲':'▼'} ${Math.abs(change)}
    </div>
  `;
}

/* HISTORY */
function renderHistory(){
  el.history.innerHTML="";
  historyData.slice(-5).reverse().forEach(i=>{
    const li=document.createElement("li");
    li.innerText=i.time+" | "+i.percent;
    el.history.appendChild(li);
  });
}

/* LOAD HISTORY */
async function loadHistory(){
  const res=await fetch("/api/history");
  historyData=await res.json();
  renderHistory();
}

/* LOAD */
async function load(){
  const res=await fetch(API);
  const d=await res.json();

  render(d);

  const item={
    time:new Date().toLocaleTimeString(),
    percent:d.percent
  };

  await fetch("/api/history",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(item)
  });

  loadHistory();
}

/* CLEAR */
async function clearHistory(){
  await fetch("/api/history",{method:"DELETE"});
  loadHistory();
}

/* INIT */
loadHistory();
</script>

</body>
</html>
