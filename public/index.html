<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XAU Professional Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* GIỮ NGUYÊN CSS GỐC CỦA BẠN - KHÔNG THAY ĐỔI GIAO DIỆN */
:root { --bg-color: #f8fafc; --header-bg: #0f172a; --card-bg: #ffffff; --primary-text: #1e293b; --secondary-text: #64748b; --up-color: #10b981; --down-color: #ef4444; --border-color: #e2e8f0; }
body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--primary-text); }
header { padding: 1rem 2rem; background: var(--header-bg); color: white; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 1000; }
.container { padding: 85px 15px 3rem; max-width: 1200px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
.card { background: white; padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border-color); }
.card.highlight { border-left: 4px solid #3b82f6; }
.table-wrapper { background: white; border-radius: 12px; border: 1px solid var(--border-color); overflow-x: auto; margin-bottom: 2rem; }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
th, td { padding: 14px 16px; text-align: right; border-bottom: 1px solid var(--border-color); }
th:first-child, td:first-child { text-align: left; }
.chart-card { padding: 1.5rem; background: white; border-radius: 12px; border: 1px solid var(--border-color); }
.chart-scroll-container { width: 100%; overflow-x: auto; margin-top: 1rem; }
.chart-inner-wrapper { min-width: 800px; height: 350px; }
.badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
.badge-up { background: #d1fae5; color: #065f46; }
.badge-down { background: #fee2e2; color: #991b1b; }
@media (max-width: 640px) { header #updateBtn { display: none; } .container { padding-top: 75px; } .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div style="font-size: 1.25rem; font-weight: 700;">📊 XAU DASHBOARD</div>
  <button id="updateBtn" onclick="load()">UPDATE</button>
</header>

<div class="container">
  <div id="lastTime" style="margin-bottom:1rem; font-size:0.875rem; color:#64748b; font-weight: 500;"></div>

  <div class="grid">
    <div class="card"><div>USD Rate</div><div id="usd" style="font-size: 1.875rem; font-weight: 800;">--</div></div>
    <div class="card highlight"><div>XAU ($)</div><div id="xau" style="font-size: 1.875rem; font-weight: 800;">--</div></div>
    <div class="card highlight"><div>SJC (VND)</div><div id="sjc" style="font-size: 1.875rem; font-weight: 800;">--</div></div>
    <div class="card"><div>Gap (VND)</div><div id="diff" style="font-size: 1.875rem; font-weight: 800;">--</div></div>
    <div class="card"><div>DIFF %</div><div id="percent" style="font-size: 1.875rem; font-weight: 800;">--</div></div>
  </div>

  <h3 style="margin-bottom: 1rem;">Query History (GMT+7)</h3>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>Thời gian</th><th>XAU ($)</th><th>SJC (VND)</th><th>Chênh lệch</th><th>Trạng thái</th></tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>

  <div class="chart-card">
    <h3 style="margin:0;">📈 Biểu đồ Chênh lệch</h3>
    <div class="chart-scroll-container">
      <div class="chart-inner-wrapper">
        <canvas id="gapChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
const fmtVND = new Intl.NumberFormat('vi-VN');
let myChart = null;

// Hàm định dạng thời gian chuẩn GMT+7
function formatVN(isoString, type = 'full') {
  const date = new Date(isoString);
  if (isNaN(date)) return "---";
  const opt = { timeZone: 'Asia/Ho_Chi_Minh', hour12: false };
  
  if (type === 'chart') {
    const t = date.toLocaleTimeString('vi-VN', { ...opt, hour: '2-digit', minute: '2-digit' });
    const d = date.toLocaleDateString('vi-VN', { ...opt, day: '2-digit', month: '2-digit' });
    return [t, d]; // Trả về mảng để Chart.js xuống dòng
  }
  return date.toLocaleString('vi-VN', opt);
}

async function load() {
  try {
    const res = await fetch("/api/gold?t=" + Date.now());
    const d = await res.json();
    if (!d.time) return;

    document.getElementById("usd").innerText = fmtVND.format(d.usd);
    document.getElementById("xau").innerText = d.xau.toLocaleString();
    document.getElementById("sjc").innerText = fmtVND.format(d.sjc);
    document.getElementById("diff").innerText = fmtVND.format(d.diff);
    document.getElementById("percent").innerText = d.percent;
    document.getElementById("lastTime").innerText = "🟢 Live: " + formatVN(new Date().toISOString());

    fetchHistory();
  } catch (e) { console.error(e); }
}

async function fetchHistory() {
  const res = await fetch("/api/history");
  const data = await res.json();
  
  const tbody = document.getElementById("history");
  tbody.innerHTML = "";
  data.slice(0, 10).forEach(r => {
    tbody.innerHTML += `<tr>
      <td>${formatVN(r.time)}</td>
      <td>${r.xau}</td>
      <td>${fmtVND.format(r.sjc)}</td>
      <td>${fmtVND.format(r.diff)}</td>
      <td><span class="badge ${r.diff >= 0 ? 'badge-up' : 'badge-down'}">${r.percent}</span></td>
    </tr>`;
  });

  updateChart(data);
}

function updateChart(data) {
  const ctx = document.getElementById('gapChart').getContext('2d');
  const chartData = [...data].reverse();
  const labels = chartData.map(r => formatVN(r.time, 'chart'));
  const values = chartData.map(r => r.diff / 1000000);

  if (myChart) myChart.destroy();
  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Gap (Tr VND)',
        data: values,
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59, 130, 246, 0.1)',
        fill: true, tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { ticks: { callback: v => v + 'M' } }
      }
    }
  });
  document.querySelector('.chart-scroll-container').scrollLeft = 9999;
}

load();
setInterval(load, 120000);
</script>
</body>
</html>
