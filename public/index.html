<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XAU Professional Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg-color: #f8fafc;
  --header-bg: #0f172a; 
  --card-bg: #ffffff;
  --primary-text: #1e293b;
  --secondary-text: #64748b;
  --up-color: #10b981;
  --down-color: #ef4444;
  --border-color: #e2e8f0;
}

body {
  margin: 0;
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  background: var(--bg-color) !important;
  color: var(--primary-text);
  overflow-x: hidden;
  overscroll-behavior-y: contain;
}

header {
  padding: 1rem 2rem;
  background: var(--header-bg);
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: fixed; 
  top: 0; left: 0; width: 100%;
  box-sizing: border-box;
  z-index: 1000;
}

.brand { font-size: 1.25rem; font-weight: 700; }

#updateBtn {
  background: #3b82f6; color: white; border: none;
  padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
}

.container { 
  width: 100%; max-width: 1200px; margin: 0 auto; 
  padding-top: 85px; 
  background: var(--bg-color); 
  min-height: 100vh;
  padding: 85px 15px 3rem 15px;
  box-sizing: border-box;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1.5rem; margin-bottom: 2rem;
}

.card {
  background: var(--card-bg); border-radius: 16px;
  padding: 1.5rem; border: 1px solid var(--border-color);
}
.card.highlight { border-left: 4px solid #3b82f6; }
.card-title { font-size: 0.75rem; color: var(--secondary-text); text-transform: uppercase; font-weight: 700; }
.card-value { font-size: 1.875rem; font-weight: 800; margin-top: 0.5rem; }

.sjc-sub { font-size: 0.875rem; margin-top: 0.25rem; display: flex; align-items: center; gap: 4px; }
.change-up { color: var(--up-color); }
.change-down { color: var(--down-color); }

#filterBox {
  display: none; background: white; padding: 15px; border-radius: 12px;
  border: 1px solid var(--border-color); margin-bottom: 1.5rem;
  gap: 10px; align-items: center; flex-wrap: wrap;
}
input[type="date"] { padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); }
.btn-filter, .btn-clear { border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; color: white; }
.btn-filter { background: #3b82f6; }
.btn-clear { background: #ef4444; }

.table-wrapper { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow-x: auto; margin-bottom: 2rem; }
table { width: 100%; border-collapse: collapse; font-size: 0.95rem; min-width: 600px; }
th { background: #f1f5f9; padding: 14px 16px; text-align: right; color: var(--secondary-text); }
td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); text-align: right; }
th:first-child, td:first-child { text-align: left; }

/* FIX BIỂU ĐỒ MOBILE */
.chart-card {
  padding: 1.5rem; background: white; border-radius: 12px; border: 1px solid var(--border-color);
}
.chart-scroll-container {
  width: 100%;
  overflow-x: auto; /* Cho phép trượt ngang */
  margin-top: 1rem;
}
.chart-inner-wrapper {
  min-width: 800px; /* Ép biểu đồ rộng ít nhất 800px để không bị nén */
  height: 350px;
}

@media (max-width: 640px) {
  header #updateBtn { display: none; } 
  .container { padding-top: 75px; }
  .grid { grid-template-columns: 1fr; gap: 0.8rem; }
  .card-value { font-size: 1.5rem; }
}

</style>
</head>
<body>

<header>
  <div class="brand">📊 XAU DASHBOARD</div>
  <button id="updateBtn" onclick="load()">UPDATE</button>
</header>

<div class="container">
  <div id="lastTime" style="margin-bottom:1rem; font-size:0.875rem; color:#64748b; font-weight: 500;"></div>

  <div class="grid">
    <div class="card"><div class="card-title">💵 USD Exchange</div><div id="usd" class="card-value">--</div></div>
    <div class="card highlight"><div class="card-title">🌍 Global XAU (oz)</div><div id="xau" class="card-value">--</div></div>
    <div class="card highlight"><div class="card-title">🧈 SJC Gold </div><div id="sjc" class="card-value">--</div></div>
    <div class="card"><div class="card-title">⚖️ Market Gap</div><div id="diff" class="card-value">--</div></div>
    <div class="card"><div class="card-title">📊 DIFF %</div><div id="percent" class="card-value">--</div></div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <div style="font-size: 1.2rem; font-weight: 700;">Query History</div>
    <button onclick="toggleFilterBox()" id="toggleBtn" style="background:transparent; border:none; font-size:1.8rem; cursor:pointer; color:#64748b;">+</button>
  </div>

  <div id="filterBox">
    <input type="date" id="filterDate">
    <button class="btn-filter" onclick="applyFilter()">Apply</button>
    <button class="btn-clear" onclick="clearAllHistory()">Clear All</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>Time</th><th>XAU ($)</th><th>SJC (VND)</th><th>Gap (VND)</th><th>Status</th></tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>

  <div class="chart-card">
    <div style="font-size: 1.1rem; font-weight: 700;">📈 XAU-SJC Gap</div>
    <div class="chart-scroll-container">
      <div class="chart-inner-wrapper">
        <canvas id="gapChart"></canvas>
      </div>
    </div>
  
  </div>
</div>

<script>
const API = "/api/gold";
const HIST_API = "/api/history"; 
const elements = {
  usd: document.getElementById("usd"),
  xau: document.getElementById("xau"),
  sjc: document.getElementById("sjc"),
  diff: document.getElementById("diff"),
  percent: document.getElementById("percent"),
  lastTime: document.getElementById("lastTime"),
  historyTable: document.getElementById("history"),
  filterBox: document.getElementById("filterBox"),
  filterDate: document.getElementById("filterDate"),
  toggleBtn: document.getElementById("toggleBtn")
};

const fmtVND = new Intl.NumberFormat('vi-VN');
const fmtXAU = new Intl.NumberFormat('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

let historyData = []; 
let lastSJCValue = null; 
let myChart = null;

async function load() {
  try {
    const res = await fetch(`${API}?t=${Date.now()}`);
    const d = await res.json();
    renderMain(d);
    if (lastSJCValue === null || d.sjc !== lastSJCValue) {
      lastSJCValue = d.sjc;
      await fetchHistory();
    }
    elements.lastTime.innerHTML = `🟢 Live: ${new Date().toLocaleString('vi-VN', {
  timeZone: 'Asia/Ho_Chi_Minh'
})}`;
  } catch(e) { console.error(e); }
}
function parseVNTime(timeStr) {
  return new Date(timeStr + ' GMT+7');
}
function renderMain(d) {
  elements.usd.innerText = fmtVND.format(d.usd);
  elements.xau.innerText = fmtXAU.format(d.xau);
  elements.diff.innerText = fmtVND.format(d.diff);
  elements.percent.innerText = d.percent;
  const key = "sjcMorning_" + new Date().toISOString().slice(0,10);
  let morning = localStorage.getItem(key) || localStorage.setItem(key, d.sjc) || d.sjc;
  const change = d.sjc - parseFloat(morning);
  const isUp = change >= 0;
  elements.sjc.innerHTML = `<div>${fmtVND.format(d.sjc)}</div><div class="sjc-sub ${isUp ? 'change-up' : 'change-down'}">${isUp ? '▲' : '▼'} ${fmtVND.format(Math.abs(change))}</div>`;
}

async function fetchHistory() {
  try {
    const res = await fetch(HIST_API);
    historyData = await res.json(); 
    renderHistory(historyData);
    updateChart(historyData);
  } catch(e) { console.error(e); }
}

function formatVNTime(timeStr) {
  const d = parseVNTime(timeStr);

  // Nếu parse được → dùng luôn
  if (!isNaN(d)) {
    return d.toLocaleString('vi-VN', {
      timeZone: 'Asia/Ho_Chi_Minh'
    });
  }

  // Nếu lỗi → giữ nguyên text gốc (fallback)
  return timeStr;
}

function renderHistory(data) {
  elements.historyTable.innerHTML = "";

  let displayData = data.slice(0, 5);

  displayData.forEach(r => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${formatVNTime(r.time)}</td>
      <td>${fmtXAU.format(r.xau)}</td>
      <td>${fmtVND.format(r.sjc)}</td>
      <td>${fmtVND.format(r.diff)}</td>
      <td><span class="badge ${r.percent.includes('-') ? 'badge-down' : 'badge-up'}">${r.percent}</span></td>
    `;

    elements.historyTable.appendChild(row);
  });
}

function updateChart(data) {
  const ctx = document.getElementById('gapChart').getContext('2d');
  
  // Dữ liệu từ trái (cũ) qua phải (mới)
  const labels = data.map(r => {
    const d = parseVNTime(r.time);

    // Nếu parse được
    if (!isNaN(d)) {
      return d.toLocaleTimeString('vi-VN', {
        timeZone: 'Asia/Ho_Chi_Minh',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Nếu lỗi → giữ nguyên (tránh Invalid Date)
    return r.time;
  });
  
  const gaps = data.map(r => r.diff / 1000000);

  // TỐI ƯU: Nếu biểu đồ đã có, chỉ nạp data mới và update để có hiệu ứng chuyển động
  if (myChart) {
    myChart.data.labels = labels;
    myChart.data.datasets[0].data = gaps;
    myChart.update();
  } else {
    // Nếu chưa có biểu đồ thì mới tạo mới
    myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Gap (M)',
          data: gaps,
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59, 130, 246, 0.1)',
          borderWidth: 3, fill: true, tension: 0.3, pointRadius: 4, hitRadius: 10
        }]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { 
          y: { beginAtZero: false, ticks: { callback: v => v + 'M' } },
          x: { ticks: { autoSkip: false, maxRotation: 45, minRotation: 45 } }
        }
      }
    });
  }

  // Tự động cuộn về cuối biểu đồ (dữ liệu mới nhất) khi load xong
  const scroller = document.querySelector('.chart-scroll-container');
  setTimeout(() => { scroller.scrollLeft = scroller.scrollWidth; }, 100);
}

function toggleFilterBox() {
  const isHidden = elements.filterBox.style.display === "none" || elements.filterBox.style.display === "";
  elements.filterBox.style.display = isHidden ? "flex" : "none";
  elements.toggleBtn.innerText = isHidden ? "−" : "+";
}

function applyFilter() {
  const selectedDate = elements.filterDate.value;
  if (!selectedDate) return;

  const filtered = historyData.filter(r => {
    const d = parseVNTime(r.time);
    const formatted = d.toLocaleDateString('sv-SE', {
  timeZone: 'Asia/Ho_Chi_Minh'
});
    return formatted === selectedDate;
  });

  renderHistory(filtered);
  updateChart(filtered);
}

async function clearAllHistory() {
  if (!confirm("Xóa toàn bộ lịch sử?")) return;
  try {
    historyData = [];
    renderHistory([]);
    updateChart([]);
    await fetch(HIST_API, { method: 'DELETE' });
    alert("Đã xóa!");
  } catch(e) { console.error("Error"); }
}

load();

/* ===== HIỆU ỨNG PULL TO REFRESH: NHỊP ĐẬP THỊ TRƯỜNG (CYBER PULSE) ===== */
const style = document.createElement('style');
style.innerHTML = `
  .cyber-pull-container {
    position: fixed; top: -80px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 15px;
    background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
    padding: 12px 24px; border-radius: 40px;
    border: 1px solid rgba(59, 130, 246, 0.3);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    z-index: 9999;
    transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s, box-shadow 0.3s;
    pointer-events: none;
  }
  
  /* Trạng thái đã kéo đủ lực */
  .cyber-pull-container.ready {
    border-color: rgba(16, 185, 129, 0.8);
    box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
  }

  .pulse-bars {
    display: flex; gap: 4px; align-items: flex-end; height: 24px;
  }
  .pulse-bar {
    width: 5px; height: 4px; border-radius: 2px;
    background: #3b82f6; 
    transition: background 0.3s;
  }
  
  /* Đổi màu khi sẵn sàng */
  .cyber-pull-container.ready .pulse-bar { background: #10b981; }
  
  /* Animation khi đang tải */
  .cyber-pull-container.refreshing .pulse-bar {
    background: #10b981;
    animation: pulseWave 0.5s ease-in-out infinite alternate;
  }
  .cyber-pull-container.refreshing .pulse-bar:nth-child(1) { animation-delay: 0.0s; }
  .cyber-pull-container.refreshing .pulse-bar:nth-child(2) { animation-delay: 0.1s; }
  .cyber-pull-container.refreshing .pulse-bar:nth-child(3) { animation-delay: 0.2s; }
  .cyber-pull-container.refreshing .pulse-bar:nth-child(4) { animation-delay: 0.3s; }

  @keyframes pulseWave {
    0% { height: 4px; box-shadow: none; }
    100% { height: 24px; box-shadow: 0 0 10px #10b981; }
  }

  .cyber-text {
    color: #94a3b8; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
    transition: color 0.3s;
  }
  .cyber-pull-container.ready .cyber-text { color: #10b981; text-shadow: 0 0 8px rgba(16,185,129,0.4); }
`;
document.head.appendChild(style);

// Tạo giao diện HTML
const pullContainer = document.createElement("div");
pullContainer.className = "cyber-pull-container";
pullContainer.innerHTML = `
  <div class="pulse-bars">
    <div class="pulse-bar" id="bar1"></div>
    <div class="pulse-bar" id="bar2"></div>
    <div class="pulse-bar" id="bar3"></div>
    <div class="pulse-bar" id="bar4"></div>
  </div>
  <div class="cyber-text">Đồng bộ dữ liệu...</div>
`;
document.body.appendChild(pullContainer);

// Logic kéo thả
let startY = 0; 
let isPulling = false;
let isRefreshing = false;
const pullThreshold = 120; // Độ dài kéo để kích hoạt
const textEl = pullContainer.querySelector('.cyber-text');
const bars = [
  document.getElementById('bar1'),
  document.getElementById('bar2'),
  document.getElementById('bar3'),
  document.getElementById('bar4')
];

// Chiều cao tối đa các cột sẽ đạt được khi kéo
const targetHeights = [12, 24, 16, 20]; 

window.addEventListener("touchstart", (e) => { 
  if (window.scrollY <= 0 && !isRefreshing) { 
    startY = e.touches[0].clientY; 
    isPulling = true; 
  } 
}, { passive: false });

window.addEventListener("touchmove", (e) => {
  if (!isPulling || isRefreshing) return;
  const currentY = e.touches[0].clientY;
  const diff = currentY - startY;
  
  if (diff > 0 && window.scrollY <= 0) {
    if (e.cancelable) e.preventDefault();
    
    // Kéo thẻ trượt xuống
    const moveY = Math.min(diff * 0.4, 90); 
    pullContainer.style.top = `${-80 + moveY}px`;
    
    // Tỷ lệ kéo (từ 0 đến 1)
    const pullRatio = Math.min(diff / pullThreshold, 1);
    
    // Hiệu ứng ĐỘNG: Cột cao lên theo lực ngón tay
    bars.forEach((bar, index) => {
      // Chiều cao cơ bản là 4px, cộng thêm phần trăm tăng trưởng
      const height = 4 + (targetHeights[index] - 4) * pullRatio;
      bar.style.height = `${height}px`;
    });
    
    if (diff > pullThreshold) {
      pullContainer.classList.add('ready');
      textEl.innerText = "Thả tay để tải mới!";
    } else {
      pullContainer.classList.remove('ready');
      textEl.innerText = "Kéo thêm chút nữa...";
    }
  }
}, { passive: false });

window.addEventListener("touchend", (e) => {
  if (!isPulling || isRefreshing) return;
  isPulling = false;
  const diff = e.changedTouches[0].clientY - startY;
  
  // Dọn dẹp style inline để CSS Animation có thể chạy
  bars.forEach(bar => bar.style.height = '');
  
  if (diff > pullThreshold) {
    isRefreshing = true;
    pullContainer.classList.remove('ready');
    pullContainer.classList.add('refreshing');
    pullContainer.style.top = "20px"; 
    textEl.innerText = "Đang phân tích...";
    
    load().then(() => {
      textEl.innerText = "Cập nhật thành công!";
      
      // Dừng nhấp nháy, set các cột full màu xanh
      pullContainer.classList.remove('refreshing');
      pullContainer.classList.add('ready');
      bars.forEach((bar, idx) => bar.style.height = `${targetHeights[idx]}px`);
      
      setTimeout(() => { 
        pullContainer.style.top = "-80px"; 
        setTimeout(() => { 
          isRefreshing = false;
          pullContainer.classList.remove('ready');
        }, 300);
      }, 1200);
    });
  } else {
    pullContainer.style.top = "-80px";
  }
});
</script>
</body>
</html>
