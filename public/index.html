<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XAU Professional Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
<style>
:root { 
  --bg-color: #f8fafc; 
  --header-old: #0f172a; 
  --header-cyber: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); 
  --card-bg: #ffffff; 
  --primary-text: #1e293b; 
  --secondary-text: #64748b; 
  --up-color: #10b981; 
  --down-color: #ef4444; 
  --border-color: #e2e8f0; 
  --accent-color: #3b82f6; 
}

body { 
  margin: 0; 
  font-family: 'Inter', -apple-system, system-ui, sans-serif; 
  background: var(--bg-color) !important; 
  color: var(--primary-text); 
  overflow-x: hidden; 
  overscroll-behavior-y: contain; 
}

.header {
  background: var(--header-cyber); color: white;
  padding: 24px 20px; text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: 1px; }
.header p { margin: 8px 0 0; font-size: 13px; color: #cbd5e1; }

.container { padding: 20px; max-width: 1200px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
.card {
  background: var(--card-bg); border-radius: 16px; padding: 24px;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
  border: 1px solid var(--border-color);
}
.card-title { font-size: 14px; color: var(--secondary-text); font-weight: 600; margin-bottom: 12px; }
.card-value { font-size: 32px; font-weight: 800; display: flex; align-items: baseline; gap: 8px; }

.chart-container {
  background: var(--card-bg); border-radius: 16px; padding: 24px; margin-bottom: 24px;
  border: 1px solid var(--border-color);
}
.chart-scroll-container { width: 100%; overflow-x: auto; border-radius: 8px; }
.chart-inner-wrapper { position: relative; height: 350px; }

.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.section-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

.filter-box {
  display: none; flex-wrap: wrap; gap: 12px; background: #f1f5f9;
  padding: 16px; border-radius: 12px; margin-bottom: 16px;
}
.btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--accent-color); color: white; }

.table-wrapper { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); }
table { width: 100%; border-collapse: collapse; text-align: right; }
th, td { padding: 16px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
th { background: #f8fafc; color: var(--secondary-text); font-size: 12px; }

.badge { padding: 4px 8px; border-radius: 6px; font-weight: 600; }
.badge-up { background: rgba(16, 185, 129, 0.1); color: var(--up-color); }
.badge-down { background: rgba(239, 68, 68, 0.1); color: var(--down-color); }

@media (max-width: 640px) {
  .chart-inner-wrapper { height: 280px !important; }
}
</style>
</head>
<body>
<div class="header">
  <h1>XAU PRO DASHBOARD</h1>
  <p id="lastTime">Đang kết nối...</p>
</div>

<div class="container">
  <div class="grid">
    <div class="card">
      <div class="card-title">💵 Tỷ Giá USD (VCB)</div>
      <div class="card-value" id="usd">--</div>
    </div>
    <div class="card">
      <div class="card-title">🌍 Vàng TG (USD/oz)</div>
      <div class="card-value" id="xau">--</div>
    </div>
    <div class="card">
      <div class="card-title">🇻🇳 Vàng SJC (VND/Lượng)</div>
      <div class="card-value" id="sjc" style="flex-direction: column;">--</div>
    </div>
  </div>

  <div class="chart-container">
    <div class="section-header">
      <div class="section-title">📉 Biểu Đồ Chênh Lệch (Gap)</div>
      <div style="font-size: 20px; font-weight: 800; color: var(--accent-color);" id="diff">--</div>
    </div>
    <div class="chart-scroll-container">
      <div class="chart-inner-wrapper">
        <canvas id="gapChart"></canvas>
      </div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title"><button id="toggleBtn" onclick="toggleFilterBox()" style="padding:5px 10px; cursor:pointer;">+</button> Lịch Sử</div>
    <button class="btn btn-primary" id="updateBtn">Làm Mới (F5)</button>
  </div>

  <div class="filter-box" id="filterBox">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button class="btn btn-primary" onclick="applyFilter()">Lọc</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>Thời gian</th><th>XAU</th><th>SJC</th><th>Gap</th><th>%</th></tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>
</div>

<script>
const API = "/api/gold";
const HIST_API = "/api/history";
const elements = {
  usd: document.getElementById("usd"), xau: document.getElementById("xau"),
  sjc: document.getElementById("sjc"), diff: document.getElementById("diff"),
  lastTime: document.getElementById("lastTime"), historyTable: document.getElementById("history"),
  filterBox: document.getElementById("filterBox"), toggleBtn: document.getElementById("toggleBtn"),
  startDate: document.getElementById("startDate"), endDate: document.getElementById("endDate")
};

const fmtVND = new Intl.NumberFormat('vi-VN');
const fmtXAU = new Intl.NumberFormat('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

let historyData = []; 
let currentData = []; 
let lastSJCValue = null; 
let myChart = null;
let isExpanded = false;

/* ===== TỐI ƯU: NHẬN REALTIME TRỰC TIẾP VÀO RAM CLIENT ===== */
const evtSource = new EventSource("/api/stream");
evtSource.onmessage = (event) => {
  const d = JSON.parse(event.data);
  if (!d || Object.keys(d).length === 0) return;
  
  elements.lastTime.style.color = "#10b981";
  setTimeout(() => elements.lastTime.style.color = "#64748b", 2000);
  
  renderMain(d);

  if (lastSJCValue === null) {
    lastSJCValue = d.sjc;
    fetchHistory();
  } else if (d.sjc !== lastSJCValue) {
    lastSJCValue = d.sjc;
    // Đẩy dữ liệu mới vào RAM, không gọi API lấy toàn bộ lịch sử
    historyData.unshift({
      createdAt: d.updatedAt, xau: d.xau, sjc: d.sjc, diff: d.diff, percent: d.percent,
      _id: "temp_" + Date.now()
    });
    if (historyData.length > 100) historyData.pop();
    applyFilter(); 
  }
};

/* ===== TẢI LẦN ĐẦU / ÉP TẢI ===== */
async function load(isForce = false) {
  try {
    const forceParam = isForce ? "&force=true" : "";
    const res = await fetch(`${API}?t=${Date.now()}${forceParam}`);
    const d = await res.json();
    if (!d || Object.keys(d).length === 0) return;
    renderMain(d);
    
    if (lastSJCValue === null) {
      lastSJCValue = d.sjc;
      await fetchHistory();
    }
  } catch(e) { console.error(e); }
}

async function fetchHistory() {
  try {
    const res = await fetch(HIST_API);
    historyData = await res.json(); 
    applyFilter();
  } catch(e) { console.error(e); }
}

function renderMain(d) {
  elements.usd.innerText = fmtVND.format(d.usd);
  elements.xau.innerText = fmtXAU.format(d.xau);
  elements.diff.innerText = fmtVND.format(d.diff) + " ₫ (" + d.percent + ")";
  
  const updateTime = new Date(d.updatedAt);
  elements.lastTime.innerHTML = `🟢 Live - ${updateTime.toLocaleTimeString('vi-VN')}`;
  elements.sjc.innerHTML = `<div>${fmtVND.format(d.sjc)}</div>`;
}

function renderTable() {
  elements.historyTable.innerHTML = "";
  currentData.slice(0, 10).forEach(r => {
    const row = document.createElement("tr");
    const d = new Date(r.createdAt);
    row.innerHTML = `
      <td>${d.getHours()}:${d.getMinutes()} ${d.getDate()}/${d.getMonth()+1}</td>
      <td>${fmtXAU.format(r.xau)}</td>
      <td>${fmtVND.format(r.sjc)}</td>
      <td>${fmtVND.format(r.diff)}</td>
      <td><span class="badge ${r.percent.includes('-') ? 'badge-down' : 'badge-up'}">${r.percent}</span></td>
    `;
    elements.historyTable.appendChild(row);
  });
}

function applyFilter() {
  const startStr = elements.startDate.value;
  const endStr = elements.endDate.value;
  
  currentData = (!startStr && !endStr) ? [...historyData] : historyData.filter(r => {
    const d = new Date(r.createdAt);
    const formatted = d.toISOString().split('T')[0];
    if(startStr && formatted < startStr) return false;
    if(endStr && formatted > endStr) return false;
    return true;
  });
  
  renderTable(); 
  updateChart(currentData);
}

function updateChart(data) {
  if (typeof Chart === 'undefined') {
    setTimeout(() => updateChart(data), 100);
    return;
  }
  
  const chartCanvas = document.getElementById('gapChart');
  const ctx = chartCanvas.getContext('2d');
  const reversedData = [...data].reverse();
  
  const pointsOnScreen = 10;
  const dynamicWidth = Math.max(100, (reversedData.length / pointsOnScreen) * 100);
  chartCanvas.parentElement.style.setProperty('width', dynamicWidth + '%', 'important');

  const labels = reversedData.map(r => {
    const d = new Date(r.createdAt);
    return d.getHours() + ":" + d.getMinutes();
  });
  const gaps = reversedData.map(r => r.diff / 1000000);

  if (myChart) {
    myChart.data.labels = labels;
    myChart.data.datasets[0].data = gaps;
    myChart.update('none'); // Update cực mượt không xài animation
  } else {
    myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          data: gaps,
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59, 130, 246, 0.1)',
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { ticks: { callback: v => v.toFixed(1) + 'M' } },
          x: { ticks: { autoSkip: false } }
        }
      }
    });
  }
  document.querySelector('.chart-scroll-container').scrollLeft = 9999;
}

function toggleFilterBox() {
  isExpanded = !isExpanded;
  elements.filterBox.style.display = isExpanded ? "flex" : "none";
  elements.toggleBtn.innerText = isExpanded ? "−" : "+";
}

document.getElementById("updateBtn").onclick = () => load(true);
window.addEventListener('DOMContentLoaded', () => load(true));


/* ===== PHỤC HỒI HIỆU ỨNG CYBER PULL-TO-REFRESH CỦA BẠN ===== */
const style = document.createElement('style');
style.innerHTML = `
  .cyber-pull-container {
    position: fixed; top: -80px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 15px;
    background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
    padding: 12px 24px; border-radius: 40px;
    border: 1px solid rgba(59, 130, 246, 0.3);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    z-index: 9999;
    transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s, box-shadow 0.3s;
    pointer-events: none;
  }
  .cyber-pull-container.ready {
    border-color: rgba(16, 185, 129, 0.8); box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
  }
  .pulse-bars { display: flex; gap: 4px; align-items: flex-end; height: 24px; }
  .pulse-bar {
    width: 5px; height: 4px; border-radius: 2px;
    background: #3b82f6; transition: background 0.3s;
  }
  .cyber-pull-container.ready .pulse-bar { background: #10b981; }
  .cyber-pull-container.refreshing .pulse-bar {
    background: #10b981; animation: pulseWave 0.5s ease-in-out infinite alternate;
  }
  .cyber-pull-container.refreshing .pulse-bar:nth-child(1) { animation-delay: 0.0s; }
  .cyber-pull-container.refreshing .pulse-bar:nth-child(2) { animation-delay: 0.1s; }
  .cyber-pull-container.refreshing .pulse-bar:nth-child(3) { animation-delay: 0.2s; }
  .cyber-pull-container.refreshing .pulse-bar:nth-child(4) { animation-delay: 0.3s; }

  @keyframes pulseWave {
    0% { height: 4px; box-shadow: none; }
    100% { height: 24px; box-shadow: 0 0 10px #10b981; }
  }

  .cyber-text {
    color: #94a3b8; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
    transition: color 0.3s;
  }
  .cyber-pull-container.ready .cyber-text { color: #10b981; text-shadow: 0 0 8px rgba(16,185,129,0.4); }
`;
document.head.appendChild(style);

const pullContainer = document.createElement("div");
pullContainer.className = "cyber-pull-container";
pullContainer.innerHTML = `
  <div class="pulse-bars">
    <div class="pulse-bar" id="bar1"></div><div class="pulse-bar" id="bar2"></div>
    <div class="pulse-bar" id="bar3"></div><div class="pulse-bar" id="bar4"></div>
  </div>
  <div class="cyber-text">Đồng bộ dữ liệu...</div>
`;
document.body.appendChild(pullContainer);

let startY = 0; 
let isPulling = false;
let isRefreshing = false;
const pullThreshold = 120; 
const textEl = pullContainer.querySelector('.cyber-text');
const bars = [
  document.getElementById('bar1'), document.getElementById('bar2'),
  document.getElementById('bar3'), document.getElementById('bar4')
];
const targetHeights = [12, 24, 16, 20]; 

window.addEventListener("touchstart", (e) => { 
  if (window.scrollY <= 0 && !isRefreshing) { startY = e.touches[0].clientY; isPulling = true; } 
}, { passive: false });

window.addEventListener("touchmove", (e) => {
  if (!isPulling || isRefreshing) return;
  const diff = e.touches[0].clientY - startY;
  
  if (diff > 0 && window.scrollY <= 0) {
    if (e.cancelable) e.preventDefault();
    const moveY = Math.min(diff * 0.4, 90); 
    pullContainer.style.top = `${-80 + moveY}px`;
    const pullRatio = Math.min(diff / pullThreshold, 1);
    
    bars.forEach((bar, index) => {
      bar.style.height = `${4 + (targetHeights[index] - 4) * pullRatio}px`;
    });
    
    if (diff > pullThreshold) {
      pullContainer.classList.add('ready'); textEl.innerText = "Thả tay để tải mới!";
    } else {
      pullContainer.classList.remove('ready'); textEl.innerText = "Kéo thêm chút nữa...";
    }
  }
}, { passive: false });

window.addEventListener("touchend", (e) => {
  if (!isPulling || isRefreshing) return;
  isPulling = false;
  const diff = e.changedTouches[0].clientY - startY;
  
  bars.forEach(bar => bar.style.height = '');
  
  if (diff > pullThreshold) {
    isRefreshing = true;
    pullContainer.classList.remove('ready');
    pullContainer.classList.add('refreshing');
    pullContainer.style.top = "20px"; 
    textEl.innerText = "Updating...";
    
    // GỌI HÀM load(true) CỦA CODE ĐÃ TỐI ƯU ĐỂ ÉP CÀO
    load(true).then(() => {
      textEl.innerText = "Success!";
      pullContainer.classList.remove('refreshing');
      pullContainer.classList.add('ready');
      bars.forEach((bar, idx) => bar.style.height = `${targetHeights[idx]}px`);
      
      setTimeout(() => { 
        pullContainer.style.top = "-80px"; 
        setTimeout(() => { 
          isRefreshing = false; pullContainer.classList.remove('ready');
        }, 300);
      }, 1200);
    });
  } else {
    pullContainer.style.top = "-80px";
  }
});
</script>
</body>
</html>
