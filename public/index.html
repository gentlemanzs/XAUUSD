<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>XAU Professional Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0" defer></script>
<link rel="stylesheet" href="style.css?v=1.7">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
<!-- KẾT NỐI FILE MANIFEST -->
<link rel="manifest" href="/manifest.json">

<!-- ĐỔI MÀU THANH TRẠNG THÁI (Đồng bộ với màu nền App) -->
<meta name="theme-color" content="#0f172a">

<!-- CÁC THẺ BẮT BUỘC ĐỂ ẨN THANH ĐỊA CHỈ TRÊN IPHONE/IPAD (SAFARI) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="XAU Dashboard">
</head>
<body>

<header>
  <div class="brand"><span>📊</span> XAU DASHBOARD</div>
  </header>

<div class="container">
  <div id="lastTime" style="margin-bottom:1rem; font-size:0.875rem; color:#64748b; font-weight: 500;">Đang kết nối...</div>

  <div class="grid">
    <div class="card usd-card"><div class="card-title">💵 USD Exchange</div><div id="usd" class="card-value">--</div></div>
    <div class="card highlight"><div class="card-title">🌍 Global XAU (oz)</div><div id="xau" class="card-value">--</div></div>
    <div class="card highlight"><div class="card-title">🧈 SJC Gold </div><div id="sjc" class="card-value">--</div></div>
    <div class="card"><div class="card-title">⚖️ Market Gap</div><div id="diff" class="card-value">--</div></div>
    <div class="card"><div class="card-title">📊 DIFF</div><div id="percent" class="card-value">--</div></div>
    <div class="card"><div class="card-title">📉 Gap Change</div><div id="gapChange" class="card-value">--</div></div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <div style="font-size: 1.2rem; font-weight: 700;">📑 History</div>
    <button onclick="toggleFilterBox()" id="toggleBtn" style="background:transparent; border:none; font-size:1.8rem; cursor:pointer; color:#64748b;">+</button>
  </div>

  <div id="filterBox">
    <input type="date" id="startDate" title="Từ ngày">
    <span style="color: var(--secondary-text); font-weight: bold;">-</span>
    <input type="date" id="endDate" title="Đến ngày">
    <button class="btn-filter" onclick="applyFilter()">Filter</button>
    <button class="btn-reset" onclick="resetFilter()">Clear</button>
    <button class="btn-delete-multi" onclick="deleteSelected()">Delete</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Time</th><th>XAU ($)</th><th>SJC (VND)</th><th>Gap (VND)</th><th>%</th>
          <th id="actionHeader" class="col-action" style="text-align: center;">
            <input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)" title="Chọn tất cả">
          </th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
    <div id="pagination" class="pagination" style="display: none;"></div>
  </div>

  <div class="chart-card">
    <div style="font-size: 1.1rem; font-weight: 700;">📈 XAU-SJC Gap</div>
    <div class="chart-scroll-container">
      <div class="chart-inner-wrapper">
        <canvas id="gapChart"></canvas>
      </div>
    </div>
  </div>
</div>
<script src="main.js" defer></script>
</body>
</html>
