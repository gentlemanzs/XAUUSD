<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Gold Dashboard</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js" defer></script>

  <link rel="stylesheet" href="style.css?v=2.1">
  <script src="main.js?v=1.1" defer></script>

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="XAU Dashboard">
</head>

<body>

  <div id="cyberPull" class="cyber-pull-container">
    <div class="radar-spinner" id="ptrIcon"></div>
    <div class="cyber-text" id="cyberText">Đồng bộ dữ liệu...</div>
  </div>

  <header>
    <div class="brand"><span>📊</span> XAU DASHBOARD</div>
    <button id="forceSyncBtn" class="sync-btn" onclick="forceSync()" title="Ép cào dữ liệu ngay lập tức">
      <span id="syncDot" class="sync-dot"></span>
    </button>
  </header>

  <div class="container">
    <div id="lastTime" class="status-text">Đang kết nối...</div>

    <div class="grid">
      <div class="card usd-card">
        <div class="card-title">💵 USD</div>
        <div id="usd" class="card-value">--</div>
      </div>

      <div class="card highlight">
        <div class="card-title">🌍 XAU</div>
        <div class="card-value xau-wrapper">
          <div id="xauValue">--</div>
          <div id="xauChange" class="sjc-sub"></div>
        </div>
      </div>

      <div class="card highlight">
        <div class="card-title">🧈 SJC</div>
        <div class="card-value">
          <div id="sjcValue">--</div>
          <div id="sjcChange" class="sjc-sub"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">⚖️ Market Gap</div>
        <div class="card-value">
          <div id="diff">--</div>
          <div id="percent" class="sjc-sub diff-sub">--</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📉 Gap Change</div>
        <div id="gapChange" class="card-value">--</div>
      </div>
    </div>

    <div class="history-header-container">
      <div class="history-title">📑 History</div>

      <div id="filterBox" class="filter-box">
        <input type="date" id="startDate" title="Từ ngày">
        <span class="filter-separator">-</span>
        <input type="date" id="endDate" title="Đến ngày">
        <button class="btn-filter" onclick="applyFilter()">Filter</button>
        <button class="btn-reset" onclick="resetFilter()">Clear</button>
        <button class="btn-delete-multi" onclick="deleteSelected()">Delete</button>
      </div>

      <button onclick="toggleFilterBox()" id="toggleBtn" class="btn-toggle-filter">+</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th class="col-time">
              Time
              <input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)" title="Chọn tất cả" class="check-action">
            </th>
            <th>XAU</th>
            <th>SJC</th>
            <th>Gap</th>
            <th class="col-diff">Diff</th>
          </tr>
        </thead>
        <tbody id="history"></tbody>
      </table>
      <div id="pagination" class="pagination" style="display: none;"></div>
    </div>

    <div class="chart-header-container">
      <div class="chart-title">📈 XAU-SJC Gap</div>
    </div>

    <div class="chart-card">
      <div class="chart-scroll-container">
        <div class="chart-inner-wrapper">
          <canvas id="gapChart"></canvas>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
