<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XAU Professional Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg-color: #f8fafc;
  --header-bg: #0f172a; 
  --card-bg: #ffffff;
  --primary-text: #1e293b;
  --secondary-text: #64748b;
  --up-color: #10b981;
  --down-color: #ef4444;
  --border-color: #e2e8f0;
}

body {
  margin: 0;
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  background: var(--header-bg) !important; /* Chống lộ nền trắng khi pull */
  color: var(--primary-text);
}

header {
  padding: 1rem 2rem;
  background: var(--header-bg);
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: fixed; 
  top: 0; left: 0; width: 100%;
  box-sizing: border-box;
  z-index: 1000;
  box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

.brand { font-size: 1.25rem; font-weight: 700; }

#updateBtn {
  background: #3b82f6; color: white; border: none;
  padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
}

.container { 
  width: 95%; max-width: 1200px; margin: 0 auto; 
  padding-top: 90px; /* Khoảng trống cho fixed header */
  background: var(--bg-color); 
  min-height: 100vh;
  padding-left: 15px; padding-right: 15px; padding-bottom: 2rem;
  box-sizing: border-box;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1.5rem; margin-bottom: 2rem;
}

.card {
  background: var(--card-bg); border-radius: 16px;
  padding: 1.5rem; border: 1px solid var(--border-color);
}
.card.highlight { border-left: 4px solid #3b82f6; }
.card-title { font-size: 0.75rem; color: var(--secondary-text); text-transform: uppercase; font-weight: 700; }
.card-value { font-size: 1.875rem; font-weight: 800; margin-top: 0.5rem; }

.sjc-sub { 
  font-size: 0.875rem; margin-top: 0.25rem; 
  display: flex; align-items: center; gap: 4px; justify-content: flex-start; 
}

.change-up { color: var(--up-color); }
.change-down { color: var(--down-color); }

/* FILTER STYLES */
#filterBox {
  display: none; /* Mặc định ẩn, hiện khi bấm nút + */
  background: white; padding: 15px; border-radius: 12px;
  border: 1px solid var(--border-color); margin-bottom: 1rem;
  gap: 10px; align-items: center; flex-wrap: wrap;
}
input[type="date"] {
  padding: 8px; border-radius: 6px; border: 1px solid var(--border-color);
}
.btn-filter {
  background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;
}
.btn-clear {
  background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;
}

.table-wrapper { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 2rem; }
table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
th { background: #f1f5f9; padding: 12px 16px; text-align: right; color: var(--secondary-text); }
td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); text-align: right; }
th:first-child, td:first-child { text-align: left; }

.badge { padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 0.8rem; }
.badge-up { background: #dcfce7; color: #166534; }
.badge-down { background: #fee2e2; color: #991b1b; }

.chart-wrapper { padding: 1.5rem; background: white; border-radius: 12px; border: 1px solid var(--border-color); }

@media (max-width: 640px) {
  header { padding: 0.75rem 1rem; }
  header #updateBtn { display: none; } 
  .container { padding-top: 70px; }
  .grid { grid-template-columns: 1fr; gap: 0.75rem; }
  .table-wrapper { overflow-x: auto; }
  table { min-width: 600px; }
}
</style>
</head>
<body>

<header>
  <div class="brand">📊 XAU DASHBOARD</div>
  <button id="updateBtn" onclick="load()">UPDATE</button>
</header>

<div class="container">
  <div id="lastTime" style="margin-bottom:1rem; font-size:0.875rem; color:#64748b;"></div>

  <div class="grid">
    <div class="card"><div class="card-title">💵 USD Exchange</div><div id="usd" class="card-value">--</div></div>
    <div class="card highlight"><div class="card-title">🌍 Global XAU (oz)</div><div id="xau" class="card-value">--</div></div>
    <div class="card highlight"><div class="card-title">🧈 SJC Gold </div><div id="sjc" class="card-value">--</div></div>
    <div class="card"><div class="card-title">⚖️ Market Gap</div><div id="diff" class="card-value">--</div></div>
    <div class="card"><div class="card-title">📊 DIFFERENCE %</div><div id="percent" class="card-value">--</div></div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <div style="font-size: 1.25rem; font-weight: 700;">Query History</div>
    <button onclick="toggleFilterBox()" id="toggleBtn" style="background:transparent; border:none; font-size:1.5rem; cursor:pointer; color:#64748b;">+</button>
  </div>

  <div id="filterBox">
    <input type="date" id="filterDate">
    <button class="btn-filter" onclick="applyFilter()">Apply</button>
    <button class="btn-clear" onclick="clearFilter()">Clear All</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>Update Time</th><th>XAU ($)</th><th>SJC (VND)</th><th>Gap (VND)</th><th>Status</th></tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>

  <div class="chart-wrapper">
    <div style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem;">📈 XAU-SJC Gap Trend</div>
    <canvas id="gapChart" style="max-height: 400px;"></canvas>
  </div>
</div>

<script>
const API = "/api/gold";
const HIST_API = "/api/history"; 
const elements = {
  usd: document.getElementById("usd"),
  xau: document.getElementById("xau"),
  sjc: document.getElementById("sjc"),
  diff: document.getElementById("diff"),
  percent: document.getElementById("percent"),
  lastTime: document.getElementById("lastTime"),
  historyTable: document.getElementById("history"),
  filterBox: document.getElementById("filterBox"),
  filterDate: document.getElementById("filterDate")
};

const fmtVND = new Intl.NumberFormat('vi-VN');
const fmtXAU = new Intl.NumberFormat('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

let historyData = []; 
let lastSJCValue = null; 
let myChart = null;

async function load() {
  try {
    const res = await fetch(`${API}?t=${Date.now()}`);
    const d = await res.json();
    renderMain(d);
    if (lastSJCValue === null || d.sjc !== lastSJCValue) {
      lastSJCValue = d.sjc;
      await fetchHistory();
    }
    elements.lastTime.innerHTML = `🟢 Live Update: ${new Date().toLocaleString('vi-VN')}`;
  } catch(e) { console.error(e); }
}

function renderMain(d) {
  elements.usd.innerText = fmtVND.format(d.usd);
  elements.xau.innerText = fmtXAU.format(d.xau);
  elements.diff.innerText = fmtVND.format(d.diff);
  elements.percent.innerText = d.percent;

  const key = "sjcMorning_" + new Date().toISOString().slice(0,10);
  let morning = localStorage.getItem(key) || localStorage.setItem(key, d.sjc) || d.sjc;
  const change = d.sjc - parseFloat(morning);
  const isUp = change >= 0;

  elements.sjc.innerHTML = `
    <div>${fmtVND.format(d.sjc)}</div>
    <div class="sjc-sub ${isUp ? 'change-up' : 'change-down'}">
      ${isUp ? '▲' : '▼'} ${fmtVND.format(Math.abs(change))}
    </div>`;
}

async function fetchHistory() {
  const res = await fetch(HIST_API);
  historyData = await res.json(); 
  renderHistory(historyData);
  updateChart(historyData);
}

function renderHistory(data) {
  elements.historyTable.innerHTML = "";
  // Hiển thị mới nhất lên đầu (đảo ngược mảng copy)
  let displayData = [...data].reverse().slice(0, 10); 
  displayData.forEach(r => {
    const row = document.createElement("tr");
    row.innerHTML = `<td>${r.time}</td><td>${fmtXAU.format(r.xau)}</td><td>${fmtVND.format(r.sjc)}</td><td>${fmtVND.format(r.diff)}</td><td><span class="badge ${r.percent.includes('-') ? 'badge-down' : 'badge-up'}">${r.percent}</span></td>`;
    elements.historyTable.appendChild(row);
  });
}

function updateChart(data) {
  const ctx = document.getElementById('gapChart').getContext('2d');
  // Vẽ từ cũ đến mới (trái sang phải)
  const labels = data.map(r => r.time.split(' ')[1] || r.time);
  const gaps = data.map(r => r.diff / 1000000);

  if (myChart) myChart.destroy();
  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Gap (M)',
        data: gaps,
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59, 130, 246, 0.1)',
        borderWidth: 3, fill: true, tension: 0.3
      }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
}

/* LOGIC BỘ LỌC ĐÃ KHÔI PHỤC */
function toggleFilterBox() {
  const isHidden = elements.filterBox.style.display === "none" || elements.filterBox.style.display === "";
  elements.filterBox.style.display = isHidden ? "flex" : "none";
  document.getElementById("toggleBtn").innerText = isHidden ? "−" : "+";
}

function applyFilter() {
  const selectedDate = elements.filterDate.value; // YYYY-MM-DD
  if (!selectedDate) return;
  
  // Lọc dữ liệu dựa trên ngày (giả định định dạng r.time là DD/MM/YYYY HH:mm:ss)
  const filtered = historyData.filter(r => {
    const parts = r.time.split(' ')[0].split('/'); // [DD, MM, YYYY]
    const rDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
    return rDate === selectedDate;
  });
  
  renderHistory(filtered);
  updateChart(filtered);
}

function clearFilter() {
  elements.filterDate.value = "";
  renderHistory(historyData);
  updateChart(historyData);
}

load();

/* PULL TO REFRESH LOGIC (Giữ nguyên bản màu Header) */
let startY = 0;
let isPulling = false;
const indicator = document.createElement("div");
indicator.innerText = "↓ Pull to refresh";
indicator.style = "position:fixed; top:20px; left:50%; transform:translateX(-50%); font-size:16px; font-weight:600; opacity:0; z-index:2000; background:#0f172a; color:white; padding:12px 24px; border-radius:30px; box-shadow:0 4px 15px rgba(0,0,0,0.3); transition:opacity 0.2s, transform 0.2s; pointer-events:none;";
document.body.appendChild(indicator);

window.addEventListener("touchstart", (e) => { if (window.scrollY === 0) { startY = e.touches[0].clientY; isPulling = true; } });
window.addEventListener("touchmove", (e) => {
  if (!isPulling) return;
  const diff = e.touches[0].clientY - startY;
  if (diff > 20) { 
    indicator.style.opacity = 1; 
    indicator.style.transform = `translateX(-50%) translateY(${Math.min(diff/2, 40)}px)`;
    indicator.innerText = diff > 80 ? "Release to refresh" : "↓ Pull to refresh"; 
  }
  if (diff > 100) { 
    isPulling = false;
    indicator.innerText = "🔄 Updating..."; 
    load();
    setTimeout(() => { indicator.style.opacity = 0; }, 1500);
  }
});
window.addEventListener("touchend", () => { isPulling = false; setTimeout(() => { if (indicator.innerText !== "🔄 Updating...") indicator.style.opacity = 0; }, 500); });
</script>
</body>
</html>
