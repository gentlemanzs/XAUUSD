<script>
const API = "/api/gold";
const elements = {
  usd: document.getElementById("usd"),
  xau: document.getElementById("xau"),
  sjc: document.getElementById("sjc"),
  diff: document.getElementById("diff"),
  percent: document.getElementById("percent"),
  lastTime: document.getElementById("lastTime"),
  historyTable: document.getElementById("history"),
  filterBox: document.getElementById("filterBox"),
  updateBtn: document.getElementById("updateBtn"),
  toggleBtn: document.getElementById("toggleBtn")
};

const fmtVND = new Intl.NumberFormat('vi-VN');
const fmtXAU = new Intl.NumberFormat('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

let history = []; // ❗ KHÔNG dùng localStorage nữa
let chartData = JSON.parse(localStorage.getItem("goldChartData") || "[]");
let filteredData = [];
let myChart;
let isExpanded = false;

/* ===== LOAD HISTORY ===== */
async function loadHistory() {
  try {
    const res = await fetch("/api/history");
    history = await res.json();
    filteredData = [...history];
    renderHistory();
  } catch (e) {
    console.error("History load error:", e);
  }
}

function initChart() {
  const ctx = document.getElementById('gapChart').getContext('2d');
  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: chartData.map(item => item.date),
      datasets: [{
        label: 'Gap (VND)',
        data: chartData.map(item => item.gap),
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59, 130, 246, 0.1)',
        borderWidth: 2,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { ticks: { callback: value => value.toLocaleString('vi-VN') } } }
    }
  });
}

function updateChartRecord(gap) {
  const now = new Date();
  const totalMinutes = now.getHours() * 60 + now.getMinutes();
  const todayKey = now.toLocaleDateString('vi-VN');

  if (totalMinutes >= 550 && totalMinutes <= 660) {
    if (!chartData.find(item => item.date === todayKey)) {
      chartData.push({ date: todayKey, gap });
      if (chartData.length > 30) chartData.shift();
      localStorage.setItem("goldChartData", JSON.stringify(chartData));

      myChart.data.labels = chartData.map(item => item.date);
      myChart.data.datasets[0].data = chartData.map(item => item.gap);
      myChart.update();
    }
  }
}

async function load() {
  elements.updateBtn.disabled = true;
  elements.updateBtn.innerText = "Updating...";

  try {
    const res = await fetch(`${API}?t=${Date.now()}`);
    const d = await res.json();

    const time = new Date().toLocaleString('vi-VN');

    const lastEntry = history[history.length - 1];

    if (!lastEntry || lastEntry.sjc !== d.sjc || lastEntry.xau !== d.xau) {

      /* ===== SAVE TO SERVER ===== */
      await fetch("/api/history", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          time,
          xau: d.xau,
          sjc: d.sjc,
          diff: d.diff,
          percent: d.percent
        })
      });

      await loadHistory(); // reload sync
    }

    renderMain(d);
    updateChartRecord(d.diff);

    elements.lastTime.innerHTML = `🟢 Live Update: ${time}`;
    localStorage.setItem("lastData", JSON.stringify(d));
    localStorage.setItem("lastTime", time);

  } catch (e) {
    console.error(e);
    alert("Error!");
  } finally {
    elements.updateBtn.disabled = false;
    elements.updateBtn.innerText = "UPDATE";
  }
}

function renderMain(d) {
  elements.usd.innerText = fmtVND.format(d.usd);
  elements.xau.innerText = fmtXAU.format(d.xau);
  elements.diff.innerText = fmtVND.format(d.diff);
  elements.percent.innerText = d.percent;

  const key = "sjcMorning_" + new Date().toISOString().slice(0,10);
  let morning = localStorage.getItem(key) || localStorage.setItem(key, d.sjc) || d.sjc;

  const change = d.sjc - parseFloat(morning);
  const isUp = change >= 0;

  elements.sjc.innerHTML =
    `<div>${fmtVND.format(d.sjc)}</div>
     <div class="sjc-sub ${isUp ? 'change-up' : 'change-down'}">
       ${isUp ? '▲' : '▼'} ${fmtVND.format(Math.abs(change))}
     </div>`;
}

function renderHistory() {
  elements.historyTable.innerHTML = "";

  let data = [...filteredData].reverse();
  if (!isExpanded) data = data.slice(0, 5);

  data.forEach((r, i) => {
    const row = document.createElement("tr");

    if (i === 0 && !isExpanded) row.className = "newest";

    const percent = r.percent || "0%";

    row.innerHTML =
      `<td>${r.time}</td>
       <td>${fmtXAU.format(r.xau)}</td>
       <td>${fmtVND.format(r.sjc)}</td>
       <td>${fmtVND.format(r.diff)}</td>
       <td><span class="badge ${percent.includes('-') ? 'badge-down' : 'badge-up'}">${percent}</span></td>`;

    elements.historyTable.appendChild(row);
  });
}

function toggleView() {
  isExpanded = !isExpanded;
  elements.toggleBtn.innerText = isExpanded ? "−" : "+";
  elements.filterBox.classList.toggle("show", isExpanded);
  renderHistory();
}

function applyFilter() {
  const date = document.getElementById("filterDate").value;
  const key = document.getElementById("searchInput").value.toLowerCase();

  filteredData = history.filter(r =>
    (!date || r.time.includes(date)) &&
    (!key || r.time.toLowerCase().includes(key))
  );

  renderHistory();
}

function resetFilter() {
  document.getElementById("filterDate").value = "";
  document.getElementById("searchInput").value = "";
  filteredData = [...history];
  renderHistory();
}

/* ===== CLEAR ALL ===== */
async function clearAll() {
  if (confirm("Clear all?")) {
    await fetch("/api/history", { method: "DELETE" });
    await loadHistory();
  }
}

/* INIT */
initChart();

const lastData = localStorage.getItem("lastData");
if (lastData) renderMain(JSON.parse(lastData));

const lastTimeSaved = localStorage.getItem("lastTime");
elements.lastTime.innerHTML =
  lastTimeSaved ? `⚪ Last update: ${lastTimeSaved}` : "Ready";

loadHistory(); // ❗ QUAN TRỌNG
</script>
