<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XAU Professional Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
<style>
:root { 
  --bg-color: #f8fafc; 
  --header-old: #0f172a; 
  --header-cyber: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); 
  --card-bg: #ffffff; 
  --primary-text: #1e293b; 
  --secondary-text: #64748b; 
  --up-color: #10b981; 
  --down-color: #ef4444; 
  --border-color: #e2e8f0; 
  --accent-color: #3b82f6; 
}

body { 
  margin: 0; 
  font-family: 'Inter', -apple-system, system-ui, sans-serif; 
  background: var(--bg-color) !important; 
  color: var(--primary-text); 
  overflow-x: hidden; 
  overscroll-behavior-y: contain; 
}

.header {
  background: var(--header-cyber); color: white;
  padding: 24px 20px; text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: 1px; }
.header p { margin: 8px 0 0; font-size: 13px; color: #cbd5e1; }

.container { padding: 20px; max-width: 1200px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
.card {
  background: var(--card-bg); border-radius: 16px; padding: 24px;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
  border: 1px solid var(--border-color);
}
.card-title { font-size: 14px; color: var(--secondary-text); font-weight: 600; margin-bottom: 12px; }
.card-value { font-size: 32px; font-weight: 800; display: flex; align-items: baseline; gap: 8px; }

.chart-container {
  background: var(--card-bg); border-radius: 16px; padding: 24px; margin-bottom: 24px;
  border: 1px solid var(--border-color);
}
.chart-scroll-container { width: 100%; overflow-x: auto; border-radius: 8px; }
.chart-inner-wrapper { position: relative; height: 350px; }

.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.section-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

.filter-box {
  display: none; flex-wrap: wrap; gap: 12px; background: #f1f5f9;
  padding: 16px; border-radius: 12px; margin-bottom: 16px;
}
.btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--accent-color); color: white; }

.table-wrapper { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); }
table { width: 100%; border-collapse: collapse; text-align: right; }
th, td { padding: 16px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
th { background: #f8fafc; color: var(--secondary-text); font-size: 12px; }

.badge { padding: 4px 8px; border-radius: 6px; font-weight: 600; }
.badge-up { background: rgba(16, 185, 129, 0.1); color: var(--up-color); }
.badge-down { background: rgba(239, 68, 68, 0.1); color: var(--down-color); }

@media (max-width: 640px) {
  .chart-inner-wrapper { height: 280px !important; }
}
</style>
</head>
<body>
<div class="header">
  <h1>XAU PRO DASHBOARD</h1>
  <p id="lastTime">Đang kết nối...</p>
</div>

<div class="container">
  <div class="grid">
    <div class="card">
      <div class="card-title">💵 Tỷ Giá USD (VCB)</div>
      <div class="card-value" id="usd">--</div>
    </div>
    <div class="card">
      <div class="card-title">🌍 Vàng TG (USD/oz)</div>
      <div class="card-value" id="xau">--</div>
    </div>
    <div class="card">
      <div class="card-title">🇻🇳 Vàng SJC (VND/Lượng)</div>
      <div class="card-value" id="sjc" style="flex-direction: column;">--</div>
    </div>
  </div>

  <div class="chart-container">
    <div class="section-header">
      <div class="section-title">📉 Biểu Đồ Chênh Lệch (Gap)</div>
      <div style="font-size: 20px; font-weight: 800; color: var(--accent-color);" id="diff">--</div>
    </div>
    <div class="chart-scroll-container">
      <div class="chart-inner-wrapper">
        <canvas id="gapChart"></canvas>
      </div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title"><button id="toggleBtn" onclick="toggleFilterBox()" style="padding:5px 10px; cursor:pointer;">+</button> Lịch Sử</div>
    <button class="btn btn-primary" id="updateBtn">Làm Mới (F5)</button>
  </div>

  <div class="filter-box" id="filterBox">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button class="btn btn-primary" onclick="applyFilter()">Lọc</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>Thời gian</th><th>XAU</th><th>SJC</th><th>Gap</th><th>%</th></tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>
</div>

<script>
const API = "/api/gold";
const HIST_API = "/api/history";
const elements = {
  usd: document.getElementById("usd"), xau: document.getElementById("xau"),
  sjc: document.getElementById("sjc"), diff: document.getElementById("diff"),
  lastTime: document.getElementById("lastTime"), historyTable: document.getElementById("history"),
  filterBox: document.getElementById("filterBox"), toggleBtn: document.getElementById
