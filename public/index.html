<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XAU Professional Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --bg-color: #f8fafc; --header-bg: #0f172a; --card-bg: #ffffff; --primary-text: #1e293b; --secondary-text: #64748b; --up-color: #10b981; --down-color: #ef4444; --border-color: #e2e8f0; --accent-color: #3b82f6; }
body { margin: 0; font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg-color) !important; color: var(--primary-text); overflow-x: hidden; overscroll-behavior-y: contain; }
header { padding: 1rem 2rem; background: var(--header-bg); color: white; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; width: 100%; box-sizing: border-box; z-index: 1000; }
.brand { font-size: 1.25rem; font-weight: 700; }
#updateBtn { background: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
.container { width: 100%; max-width: 1200px; margin: 0 auto; background: var(--bg-color); min-height: 100vh; padding: 85px 15px 3rem 15px; box-sizing: border-box; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
.card { background: var(--card-bg); border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border-color); }
.card.highlight { border-left: 4px solid var(--accent-color); }
.card-title { font-size: 0.75rem; color: var(--secondary-text); text-transform: uppercase; font-weight: 700; }
.card-value { font-size: 1.875rem; font-weight: 800; margin-top: 0.5rem; }
.sjc-sub { font-size: 0.875rem; margin-top: 0.25rem; display: flex; align-items: center; gap: 4px; }
.change-up { color: var(--up-color); } .change-down { color: var(--down-color); }
#filterBox { display: none; background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 1.5rem; gap: 10px; align-items: center; flex-wrap: wrap; }
input[type="date"] { padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); }
.btn-filter, .btn-clear, .btn-delete-multi { border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; color: white; transition: 0.2s; }
.btn-filter { background: var(--accent-color); } .btn-clear { background: #ef4444; } 
.btn-delete-multi { background: #f97316; } .btn-delete-multi:hover { background: #ea580c; }
.table-wrapper { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow-x: auto; margin-bottom: 2rem; }
table { width: 100%; border-collapse: collapse; font-size: 0.95rem; min-width: 600px; }
th { background: #f1f5f9; padding: 14px 16px; text-align: right; color: var(--secondary-text); }
td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); text-align: right; }
th:first-child, td:first-child { text-align: left; }
.badge { padding: 4px 8px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; }
.badge-up { background: rgba(16, 185, 129, 0.1); color: var(--up-color); }
.badge-down { background: rgba(239, 68, 68, 0.1); color: var(--down-color); }
.col-action { display: none; text-align: center; }
.log-checkbox, #selectAll { width: 16px; height: 16px; cursor: pointer; }

/* CSS Phân trang */
.pagination { display: flex; justify-content: center; gap: 8px; padding: 15px; border-top: 1px solid var(--border-color); }
.page-btn { padding: 6px 12px; border: 1px solid var(--border-color); background: var(--card-bg); border-radius: 6px; cursor: pointer; color: var(--primary-text); font-weight: 600; transition: 0.2s;}
.page-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
.page-btn:hover:not(:disabled):not(.active) { background: #f1f5f9; }
.page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.chart-card { padding: 1.5rem; background: white; border-radius: 12px; border: 1px solid var(--border-color); }
.chart-scroll-container { width: 100%; overflow-x: auto; margin-top: 1rem; }
.chart-inner-wrapper { min-width: 800px; height: 350px; }
@media (max-width: 640px) { header #updateBtn { display: none; } .container { padding-top: 75px; } .grid { grid-template-columns: 1fr; gap: 0.8rem; } .card-value { font-size: 1.5rem; } }
</style>
</head>
<body>

<header>
  <div class="brand">📊 XAU DASHBOARD</div>
  <button id="updateBtn" onclick="load()">UPDATE</button>
</header>

<div class="container">
  <div id="lastTime" style="margin-bottom:1rem; font-size:0.875rem; color:#64748b; font-weight: 500;">Đang kết nối...</div>

  <div class="grid">
    <div class="card"><div class="card-title">💵 USD Exchange</div><div id="usd" class="card-value">--</div></div>
    <div class="card highlight"><div class="card-title">🌍 Global XAU (oz)</div><div id="xau" class="card-value">--</div></div>
    <div class="card highlight"><div class="card-title">🧈 SJC Gold </div><div id="sjc" class="card-value">--</div></div>
    <div class="card"><div class="card-title">⚖️ Market Gap</div><div id="diff" class="card-value">--</div></div>
    <div class="card"><div class="card-title">📊 DIFF %</div><div id="percent" class="card-value">--</div></div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <div style="font-size: 1.2rem; font-weight: 700;">Query History</div>
    <button onclick="toggleFilterBox()" id="toggleBtn" style="background:transparent; border:none; font-size:1.8rem; cursor:pointer; color:#64748b;">+</button>
  </div>

  <div id="filterBox">
    <input type="date" id="filterDate">
    <button class="btn-filter" onclick="applyFilter()">Apply</button>
    <button class="btn-clear" onclick="clearAllHistory()">Clear All</button>
    <button class="btn-delete-multi" onclick="deleteSelected()">Xóa đã chọn</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Time</th><th>XAU ($)</th><th>SJC (VND)</th><th>Gap (VND)</th><th>%</th>
          <th id="actionHeader" class="col-action" style="text-align: center;">
            <input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)" title="Chọn tất cả">
          </th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
    <div id="pagination" class="pagination" style="display: none;"></div>
  </div>

  <div class="chart-card">
    <div style="font-size: 1.1rem; font-weight: 700;">📈 XAU-SJC Gap</div>
    <div class="chart-scroll-container">
      <div class="chart-inner-wrapper">
        <canvas id="gapChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
const API = "/api/gold";
const HIST_API = "/api/history"; 
const elements = {
  usd: document.getElementById("usd"), xau: document.getElementById("xau"),
  sjc: document.getElementById("sjc"), diff: document.getElementById("diff"),
  percent: document.getElementById("percent"), lastTime: document.getElementById("lastTime"),
  historyTable: document.getElementById("history"), filterBox: document.getElementById("filterBox"),
  filterDate: document.getElementById("filterDate"), toggleBtn: document.getElementById("toggleBtn"),
  actionHeader: document.getElementById("actionHeader"), pagination: document.getElementById("pagination")
};

const fmtVND = new Intl.NumberFormat('vi-VN');
const fmtXAU = new Intl.NumberFormat('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

let historyData = []; 
let currentData = []; // Dữ liệu đang thao tác (chứa data đã filter)
let lastSJCValue = null; 
let myChart = null;

// Biến kiểm soát trạng thái
let isExpanded = false; 
let currentPage = 1;

async function load() {
  try {
    const res = await fetch(`${API}?t=${Date.now()}`);
    const d = await res.json();
    if (!d || Object.keys(d).length === 0) return;
    
    renderMain(d);
    
    if (lastSJCValue === null || d.sjc !== lastSJCValue) {
      lastSJCValue = d.sjc;
      await fetchHistory();
    }
  } catch(e) { console.error(e); }
}

function renderMain(d) {
  elements.usd.innerText = fmtVND.format(d.usd);
  elements.xau.innerText = fmtXAU.format(d.xau);
  elements.diff.innerText = fmtVND.format(d.diff);
  elements.percent.innerText = d.percent;
  
  const key = "sjcMorning_" + new Date().toISOString().slice(0,10);
  let morning = localStorage.getItem(key) || localStorage.setItem(key, d.sjc) || d.sjc;
  const change = d.sjc - parseFloat(morning);
  const isUp = change >= 0;
  
  elements.sjc.innerHTML = `<div>${fmtVND.format(d.sjc)}</div><div class="sjc-sub ${isUp ? 'change-up' : 'change-down'}">${isUp ? '▲' : '▼'} ${fmtVND.format(Math.abs(change))}</div>`;

  const updateTime = new Date(d.updatedAt);
  const timeStr = isNaN(updateTime) ? new Date().toLocaleTimeString('vi-VN') : updateTime.toLocaleTimeString('vi-VN');
  const statusIcon = d.status === "Delayed" ? "🟡 Tạm thời (Fallback)" : "🟢 Live";
  elements.lastTime.innerHTML = `${statusIcon} - Cập nhật: ${timeStr}`;
}

async function fetchHistory() {
  try {
    const res = await fetch(HIST_API);
    historyData = await res.json(); 
    currentData = [...historyData]; 
    renderTable(); // Vẽ lại bảng dựa theo state hiện tại
    updateChart(currentData);
  } catch(e) { console.error(e); }
}

function formatVNDateTime(isoString) {
  const d = new Date(isoString);
  if (isNaN(d)) return "--";
  return d.toLocaleString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh', day: '2-digit', month: '2-digit', hour: '2-digit', minute:'2-digit' });
}

// Hàm render bảng có kết hợp phân trang
function renderTable() {
  elements.historyTable.innerHTML = "";
  
  // Tính toán số dòng
  const pageSize = isExpanded ? 20 : 10;
  const startIdx = isExpanded ? (currentPage - 1) * pageSize : 0;
  const endIdx = startIdx + pageSize;
  
  const displayData = currentData.slice(startIdx, endIdx);
  const displayStyle = isExpanded ? "table-cell" : "none";

  // Reset nút checkall mỗi khi chuyển trang
  document.getElementById('selectAll').checked = false;

  displayData.forEach(r => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${formatVNDateTime(r.createdAt)}</td>
      <td>${fmtXAU.format(r.xau)}</td>
      <td>${fmtVND.format(r.sjc)}</td>
      <td>${fmtVND.format(r.diff)}</td>
      <td><span class="badge ${r.percent.includes('-') ? 'badge-down' : 'badge-up'}">${r.percent}</span></td>
      <td class="col-action" style="display: ${displayStyle}; text-align: center;">
        <input type="checkbox" class="log-checkbox" value="${r._id}">
      </td>
    `;
    elements.historyTable.appendChild(row);
  });

  renderPagination();
}

// Logic vẽ nút phân trang
function renderPagination() {
  const pag = elements.pagination;
  if (!isExpanded || currentData.length <= 20) {
    pag.style.display = "none";
    return;
  }
  
  pag.style.display = "flex";
  pag.innerHTML = "";

  const totalPages = Math.ceil(currentData.length / 20);

  // Nút Lùi
  const prevBtn = document.createElement("button");
  prevBtn.className = "page-btn"; prevBtn.innerText = "« Trước";
  prevBtn.disabled = currentPage === 1;
  prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; renderTable(); } };
  pag.appendChild(prevBtn);

  // Các nút số (Hiển thị thông minh 5 trang gần nhất)
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, startPage + 4);
  if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

  for (let i = startPage; i <= endPage; i++) {
    const btn = document.createElement("button");
    btn.className = `page-btn ${i === currentPage ? "active" : ""}`;
    btn.innerText = i;
    btn.onclick = () => { currentPage = i; renderTable(); };
    pag.appendChild(btn);
  }

  // Nút Tới
  const nextBtn = document.createElement("button");
  nextBtn.className = "page-btn"; nextBtn.innerText = "Sau »";
  nextBtn.disabled = currentPage === totalPages;
  nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; renderTable(); } };
  pag.appendChild(nextBtn);
}

// Khi bấm nút +
function toggleFilterBox() {
  isExpanded = !isExpanded;
  elements.filterBox.style.display = isExpanded ? "flex" : "none";
  elements.toggleBtn.innerText = isExpanded ? "−" : "+";
  elements.actionHeader.style.display = isExpanded ? "table-cell" : "none";
  
  // Trở về trang 1 khi đóng/mở menu nâng cao
  currentPage = 1;
  renderTable();
}

function applyFilter() {
  const selectedDate = elements.filterDate.value;
  if (!selectedDate) {
    currentData = [...historyData];
  } else {
    currentData = historyData.filter(r => {
      const d = new Date(r.createdAt);
      if(isNaN(d)) return false;
      const formatted = d.toLocaleDateString('en-CA', { timeZone: 'Asia/Ho_Chi_Minh' }); 
      return formatted === selectedDate;
    });
  }
  currentPage = 1;
  renderTable();
  updateChart(currentData);
}

function toggleSelectAll(source) {
  const checkboxes = document.querySelectorAll('.log-checkbox');
  checkboxes.forEach(cb => cb.checked = source.checked);
}

async function deleteSelected() {
  const checkedBoxes = document.querySelectorAll('.log-checkbox:checked');
  if (checkedBoxes.length === 0) { alert("Vui lòng tích chọn ít nhất 1 dòng để xóa."); return; }
  if (!confirm(`Bạn có chắc chắn muốn xóa ${checkedBoxes.length} bản ghi đã chọn?`)) return;

  const ids = Array.from(checkedBoxes).map(cb => cb.value);

  try {
    const res = await fetch('/api/history/bulk-delete', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: ids })
    });
    if (res.ok) { await fetchHistory(); } 
    else { alert("Lỗi khi xóa dữ liệu!"); }
  } catch(e) { console.error(e); alert("Lỗi mạng!"); }
}

async function clearAllHistory() {
  if (!confirm("Hành động này không thể hoàn tác. Bạn có chắc chắn xóa TOÀN BỘ lịch sử?")) return;
  try {
    const res = await fetch(HIST_API, { method: 'DELETE' });
    if (res.ok) {
      historyData = []; currentData = [];
      renderTable(); updateChart([]);
    }
  } catch(e) { console.error(e); alert("Lỗi mạng!"); }
}

// Chart.js được update hiển thị tiền đầy đủ
function updateChart(data) {
  const ctx = document.getElementById('gapChart').getContext('2d');
  const reversedData = [...data].reverse();
  const labels = reversedData.map(r => {
    const d = new Date(r.createdAt);
    return isNaN(d) ? '' : d.toLocaleTimeString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh', hour: '2-digit', minute: '2-digit' });
  });
  const gaps = reversedData.map(r => r.diff / 1000000);

  if (myChart) {
    myChart.data.labels = labels;
    myChart.data.datasets[0].data = gaps;
    myChart.update();
  } else {
    myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Gap (M)', data: gaps, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)',
          borderWidth: 3, fill: true, tension: 0.3, pointRadius: 4, hitRadius: 10
        }]
      },
      options: { 
        responsive: true, maintainAspectRatio: false, 
        plugins: { 
          legend: { display: false },
          // Tối ưu tooltip hiển thị đầy đủ VNĐ
          tooltip: {
            callbacks: {
              label: function(context) {
                return 'Gap: ' + new Intl.NumberFormat('vi-VN').format(context.raw * 1000000) + ' ₫';
              }
            }
          }
        },
        scales: { y: { beginAtZero: false, ticks: { callback: v => v + 'M' } }, x: { ticks: { autoSkip: false, maxRotation: 45, minRotation: 45 } } }
      }
    });
  }
  const scroller = document.querySelector('.chart-scroll-container');
  setTimeout(() => { scroller.scrollLeft = scroller.scrollWidth; }, 100);
}

load();

/* ===== CYBER PULSE EFFECT (Giữ nguyên) ===== */
const style = document.createElement('style');
style.innerHTML = `.cyber-pull-container { position: fixed; top: -80px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 15px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 40px; border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); z-index: 9999; transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s, box-shadow 0.3s; pointer-events: none; } .cyber-pull-container.ready { border-color: rgba(16, 185, 129, 0.8); box-shadow: 0 0 25px rgba(16, 185, 129, 0.2); } .pulse-bars { display: flex; gap: 4px; align-items: flex-end; height: 24px; } .pulse-bar { width: 5px; height: 4px; border-radius: 2px; background: #3b82f6; transition: background 0.3s; } .cyber-pull-container.ready .pulse-bar { background: #10b981; } .cyber-pull-container.refreshing .pulse-bar { background: #10b981; animation: pulseWave 0.5s ease-in-out infinite alternate; } .cyber-pull-container.refreshing .pulse-bar:nth-child(1) { animation-delay: 0.0s; } .cyber-pull-container.refreshing .pulse-bar:nth-child(2) { animation-delay: 0.1s; } .cyber-pull-container.refreshing .pulse-bar:nth-child(3) { animation-delay: 0.2s; } .cyber-pull-container.refreshing .pulse-bar:nth-child(4) { animation-delay: 0.3s; } @keyframes pulseWave { 0% { height: 4px; box-shadow: none; } 100% { height: 24px; box-shadow: 0 0 10px #10b981; } } .cyber-text { color: #94a3b8; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; transition: color 0.3s; } .cyber-pull-container.ready .cyber-text { color: #10b981; text-shadow: 0 0 8px rgba(16,185,129,0.4); }`;
document.head.appendChild(style);

const pullContainer = document.createElement("div"); pullContainer.className = "cyber-pull-container";
pullContainer.innerHTML = `<div class="pulse-bars"><div class="pulse-bar" id="bar1"></div><div class="pulse-bar" id="bar2"></div><div class="pulse-bar" id="bar3"></div><div class="pulse-bar" id="bar4"></div></div><div class="cyber-text">Đồng bộ dữ liệu...</div>`;
document.body.appendChild(pullContainer);

let startY = 0; let isPulling = false; let isRefreshing = false; const pullThreshold = 120; 
const textEl = pullContainer.querySelector('.cyber-text');
const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
const targetHeights = [12, 24, 16, 20]; 

window.addEventListener("touchstart", (e) => { if (window.scrollY <= 0 && !isRefreshing) { startY = e.touches[0].clientY; isPulling = true; } }, { passive: false });
window.addEventListener("touchmove", (e) => {
  if (!isPulling || isRefreshing) return;
  const diff = e.touches[0].clientY - startY;
  if (diff > 0 && window.scrollY <= 0) {
    if (e.cancelable) e.preventDefault();
    const moveY = Math.min(diff * 0.4, 90); pullContainer.style.top = `${-80 + moveY}px`;
    const pullRatio = Math.min(diff / pullThreshold, 1);
    bars.forEach((bar, index) => { bar.style.height = `${4 + (targetHeights[index] - 4) * pullRatio}px`; });
    if (diff > pullThreshold) { pullContainer.classList.add('ready'); textEl.innerText = "Thả tay để tải mới!"; } else { pullContainer.classList.remove('ready'); textEl.innerText = "Kéo thêm chút nữa..."; }
  }
}, { passive: false });

window.addEventListener("touchend", (e) => {
  if (!isPulling || isRefreshing) return;
  isPulling = false;
  const diff = e.changedTouches[0].clientY - startY;
  bars.forEach(bar => bar.style.height = '');
  if (diff > pullThreshold) {
    isRefreshing = true; pullContainer.classList.remove('ready'); pullContainer.classList.add('refreshing'); pullContainer.style.top = "20px"; textEl.innerText = "Đang phân tích...";
    load().then(() => {
      textEl.innerText = "Cập nhật thành công!";
      pullContainer.classList.remove('refreshing'); pullContainer.classList.add('ready');
      bars.forEach((bar, idx) => bar.style.height = `${targetHeights[idx]}px`);
      setTimeout(() => { pullContainer.style.top = "-80px"; setTimeout(() => { isRefreshing = false; pullContainer.classList.remove('ready'); }, 300); }, 1200);
    });
  } else { pullContainer.style.top = "-80px"; }
});
</script>
</body>
</html>
