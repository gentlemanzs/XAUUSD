<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XAU Professional Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-color: #f8fafc;
  --header-bg: #0f172a; 
  --card-bg: #ffffff;
  --primary-text: #1e293b;
  --secondary-text: #64748b;
  --up-color: #10b981;
  --down-color: #ef4444;
  --border-color: #e2e8f0;
  --accent-color: #3b82f6;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg-color);
  color: var(--primary-text);
  overflow-x: hidden;
  overscroll-behavior-y: contain;
}

header {
  padding: 0.75rem 1.5rem;
  background: var(--header-bg);
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: fixed; 
  top: 0; left: 0; width: 100%;
  box-sizing: border-box;
  z-index: 1000;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

.brand { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; }

#updateBtn {
  border: none; padding: 8px 16px; border-radius: 8px; 
  font-weight: 600; background: var(--accent-color); color: white; cursor: pointer;
}

.container { 
  width: 100%; max-width: 1200px; margin: 0 auto; 
  padding: 90px 15px 3rem 15px;
  box-sizing: border-box;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem; margin-bottom: 2rem;
}

.card {
  background: var(--card-bg); border-radius: 16px;
  padding: 1.25rem; border: 1px solid var(--border-color);
}
.card.highlight { border-left: 4px solid var(--accent-color); }
.card-title { font-size: 0.7rem; color: var(--secondary-text); text-transform: uppercase; font-weight: 700; margin-bottom: 0.5rem; }
.card-value { font-size: 1.6rem; font-weight: 800; }

.sjc-sub { font-size: 0.85rem; margin-top: 0.4rem; display: flex; align-items: center; gap: 4px; font-weight: 600; }
.change-up { color: var(--up-color); }
.change-down { color: var(--down-color); }

.table-wrapper { 
  background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow-x: auto; margin-bottom: 2rem; 
}
table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 600px; }
th { background: #f8fafc; padding: 12px 15px; text-align: right; color: var(--secondary-text); font-weight: 700; border-bottom: 1px solid var(--border-color); }
td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); text-align: right; }
th:first-child, td:first-child { text-align: left; }

.badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }
.badge-up { background: rgba(16, 185, 129, 0.1); color: var(--up-color); }
.badge-down { background: rgba(239, 68, 68, 0.1); color: var(--down-color); }

.chart-card { padding: 1.5rem; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color); }
.chart-scroll-container { width: 100%; overflow-x: auto; margin-top: 1rem; }
.chart-inner-wrapper { min-width: 800px; height: 320px; }

#filterBox {
  display: none; background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 1.5rem; gap: 10px;
}
input[type="date"] { padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); font-family: inherit; }

/* MOBILE OPTIMIZATION: GRID 2 CỘT */
@media (max-width: 640px) {
  .container { padding-top: 75px; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
  .card.highlight { grid-column: span 2; } /* Vàng SJC và XAU chiếm trọn hàng */
  .grid .card:last-child { grid-column: span 2; } /* % DIFF chiếm trọn hàng */
  .card-value { font-size: 1.3rem; }
  .card { padding: 1rem; }
}

/* CYBER PULL TO REFRESH CSS */
.cyber-pull-container {
  position: fixed; top: -80px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 15px;
  background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
  padding: 12px 24px; border-radius: 40px; border: 1px solid rgba(59, 130, 246, 0.3);
  z-index: 9999; transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none;
}
.pulse-bar { width: 5px; height: 4px; background: #3b82f6; border-radius: 2px; transition: 0.2s; }
.refreshing .pulse-bar { animation: pulseWave 0.5s infinite alternate; }
@keyframes pulseWave { from { height: 4px; } to { height: 20px; } }
</style>
</head>
<body>

<header>
  <div class="brand">📊 XAU DASHBOARD</div>
  <button id="updateBtn" onclick="load()">UPDATE</button>
</header>

<div class="container">
  <div id="statusLabel" style="margin-bottom:1rem; font-size:0.8rem; font-weight: 600; color: var(--secondary-text);">
    <span id="indicator">⚪</span> <span id="statusText">Đang kết nối...</span>
  </div>

  <div class="grid">
    <div class="card">
        <div class="card-title">💵 USD Exchange</div>
        <div id="usd" class="card-value">--</div>
    </div>
    <div class="card">
        <div class="card-title">⚖️ Market Gap</div>
        <div id="diff" class="card-value">--</div>
    </div>

    <div class="card highlight">
        <div class="card-title">🌍 Global XAU (oz)</div>
        <div id="xau" class="card-value">--</div>
    </div>
    <div class="card highlight">
        <div class="card-title">🧈 SJC Gold (Lượng)</div>
        <div id="sjc" class="card-value">--</div>
    </div>

    <div class="card">
        <div class="card-title">📊 DIFF Percentage</div>
        <div id="percent" class="card-value">--</div>
    </div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <div style="font-size: 1.1rem; font-weight: 800;">Lịch sử truy vấn</div>
    <button onclick="toggleFilter()" id="toggleBtn" style="background:transparent; border:none; font-size:1.5rem; cursor:pointer; color:var(--secondary-text);">+</button>
  </div>

  <div id="filterBox">
    <input type="date" id="filterDate">
    <button onclick="applyFilter()" style="background:var(--accent-color); color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer;">Lọc</button>
    <button onclick="clearAllHistory()" style="background:var(--down-color); color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer;">Xóa hết</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>Thời gian</th><th>XAU ($)</th><th>SJC (VND)</th><th>Chênh lệch</th><th>Trạng thái</th></tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>

  <div class="chart-card">
    <div style="font-size: 1rem; font-weight: 800;">📈 Biến động Gap (Triệu VNĐ)</div>
    <div class="chart-scroll-container">
      <div class="chart-inner-wrapper"><canvas id="gapChart"></canvas></div>
    </div>
  </div>
</div>

<script>
const API = "/api/gold";
const HIST_API = "/api/history"; 
const fmtVND = new Intl.NumberFormat('vi-VN');
const fmtXAU = new Intl.NumberFormat('en-US', { minimumFractionDigits: 1 });

let myChart = null;
let historyData = [];

async function load() {
  try {
    const res = await fetch(`${API}?t=${Date.now()}`);
    const d = await res.json();
    if (!d.sjc) return;
    renderDashboard(d);
    await fetchHistory();
  } catch(e) { console.error(e); }
}

function renderDashboard(d) {
  document.getElementById("usd").innerText = fmtVND.format(d.usd);
  document.getElementById("xau").innerText = fmtXAU.format(d.xau);
  document.getElementById("diff").innerText = fmtVND.format(d.diff);
  document.getElementById("percent").innerText = d.percent;
  
  const key = "sjcStart_" + new Date().toISOString().slice(0,10);
  let startPrice = localStorage.getItem(key) || localStorage.setItem(key, d.sjc) || d.sjc;
  const change = d.sjc - parseFloat(startPrice);
  const isUp = change >= 0;
  
  document.getElementById("sjc").innerHTML = `
    <div>${fmtVND.format(d.sjc)}</div>
    <div class="sjc-sub ${isUp ? 'change-up' : 'change-down'}">${isUp ? '▲' : '▼'} ${fmtVND.format(Math.abs(change))}</div>
  `;

  const timeLabel = new Date(d.updatedAt).toLocaleTimeString('vi-VN');
  document.getElementById("indicator").innerText = d.status === "Delayed" ? "🟡" : "🟢";
  document.getElementById("statusText").innerText = `${d.status === "Delayed" ? "Giá dự phòng" : "Trực tuyến"} - ${timeLabel}`;
}

async function fetchHistory() {
  const res = await fetch(HIST_API);
  historyData = await res.json();
  renderHistoryTable(historyData);
  renderChart(historyData);
}

function renderHistoryTable(data) {
  const container = document.getElementById("historyBody");
  container.innerHTML = "";
  data.slice(0, 10).forEach(r => {
    const row = document.createElement("tr");
    // Xử lý thời gian chuẩn ISO từ MongoDB
    const time = new Date(r.createdAt).toLocaleString('vi-VN', {hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'});
    row.innerHTML = `
      <td>${time}</td>
      <td>${fmtXAU.format(r.xau)}</td>
      <td>${fmtVND.format(r.sjc)}</td>
      <td>${fmtVND.format(r.diff)}</td>
      <td><span class="badge ${r.percent.includes('-') ? 'badge-down' : 'badge-up'}">${r.percent}</span></td>
    `;
    container.appendChild(row);
  });
}

function renderChart(data) {
  const ctx = document.getElementById('gapChart').getContext('2d');
  const reversed = [...data].reverse();
  const labels = reversed.map(r => new Date(r.createdAt).toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'}));
  const points = reversed.map(r => r.diff / 1000000);

  if (myChart) {
    myChart.data.labels = labels;
    myChart.data.datasets[0].data = points;
    myChart.update();
  } else {
    myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          data: points, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)',
          borderWidth: 3, fill: true, tension: 0.4, pointRadius: 4
        }]
      },
      options: { 
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { ticks: { callback: v => v + 'M' } } }
      }
    });
  }
}

function toggleFilter() {
  const box = document.getElementById("filterBox");
  box.style.display = (box.style.display === "none" || box.style.display === "") ? "flex" : "none";
  document.getElementById("toggleBtn").innerText = box.style.display === "flex" ? "−" : "+";
}

function applyFilter() {
  const date = document.getElementById("filterDate").value;
  if (!date) return;
  const filtered = historyData.filter(r => new Date(r.createdAt).toLocaleDateString('en-CA') === date);
  renderHistoryTable(filtered);
}

async function clearAllHistory() {
  const key = prompt("Nhập mã bí mật để xác nhận xóa:");
  if (!key) return;
  if (!confirm("Bạn có chắc chắn muốn xóa toàn bộ lịch sử?")) return;
  
  const res = await fetch(HIST_API, { 
    method: 'DELETE', 
    headers: { 'x-admin-key': key } 
  });
  
  if (res.ok) {
    alert("Đã xóa thành công!");
    load();
  } else {
    alert("Mã bí mật không đúng!");
  }
}

// CYBER PULL TO REFRESH LOGIC
const pullContainer = document.createElement("div");
pullContainer.className = "cyber-pull-container";
pullContainer.innerHTML = `<div style="display:flex; gap:4px; align-items:flex-end; height:24px;">${'<div class="pulse-bar"></div>'.repeat(4)}</div><div style="color:white; font-size:14px; font-weight:600;">Đồng bộ dữ liệu...</div>`;
document.body.appendChild(pullContainer);

let startY = 0; let pulling = false;
window.addEventListener("touchstart", e => { if (window.scrollY <= 0) { startY = e.touches[0].clientY; pulling = true; } });
window.addEventListener("touchmove", e => {
  if (!pulling) return;
  const diff = e.touches[0].clientY - startY;
  if (diff > 0) {
    pullContainer.style.top = `${Math.min(diff/3 - 80, 20)}px`;
  }
});
window.addEventListener("touchend", e => {
  const diff = e.changedTouches[0].clientY - startY;
  if (pulling && diff > 250) {
    pullContainer.classList.add("refreshing");
    load().then(() => { 
      setTimeout(() => { pullContainer.style.top = "-80px"; pullContainer.classList.remove("refreshing"); }, 1000);
    });
  } else { pullContainer.style.top = "-80px"; }
  pulling = false;
});

load();
</script>
</body>
</html>
