<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAU Professional Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg-color: #f8fafc;
  --header-bg: #0f172a;
  --card-bg: #ffffff;
  --primary-text: #1e293b;
  --secondary-text: #64748b;
  --up-color: #10b981;
  --down-color: #ef4444;
  --border-color: #e2e8f0;
}

body {
  margin: 0;
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  background: var(--bg-color);
  color: var(--primary-text);
  line-height: 1.6;
}

/* HEADER */
header {
  padding: 1rem 2rem;
  background: var(--header-bg);
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

.brand { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.025em; }

#updateBtn {
  background: #3b82f6;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
#updateBtn:hover { background: #2563eb; transform: translateY(-1px); }
#updateBtn:disabled { background: #94a3b8; cursor: not-allowed; }

/* NÚT TOGGLE THEO YÊU CẦU MỚI */
#toggleBtn {
  background: transparent; /* Nền trong suốt */
  color: #64748b;         /* Màu dấu + */
  border: 1px solid transparent; /* Viền trong suốt */
  font-size: 1.5rem;      /* Kích thước dấu + */
  font-weight: 400;
  cursor: pointer;
  padding: 0 10px;
  transition: color 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
#toggleBtn:hover { color: #1e293b; }

.container { width: 95%; max-width: 1200px; margin: 2rem auto; }

#lastTime { 
  font-size: 0.875rem; 
  color: var(--secondary-text); 
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* GRID & CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 1.5rem;
  border: 1px solid var(--border-color);
  box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
}

.card.highlight { border-left: 4px solid #3b82f6; }

.card-title { 
  font-size: 0.75rem; 
  color: var(--secondary-text); 
  text-transform: uppercase; 
  font-weight: 700;
  letter-spacing: 0.05em;
}

.card-value { 
  font-size: 1.875rem; 
  font-weight: 800; 
  margin-top: 0.5rem; 
  font-variant-numeric: tabular-nums;
}

.sjc-sub { font-size: 0.875rem; margin-top: 0.25rem; display: flex; align-items: center; gap: 4px; }
.change-up { color: var(--up-color); }
.change-down { color: var(--down-color); }

/* TABLE */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 3rem;
  margin-bottom: 1rem;
}

.section-title { font-size: 1.25rem; font-weight: 700; }

.table-wrapper {
  background: var(--card-bg);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  overflow: hidden;
  box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
th { background: #f1f5f9; padding: 12px 16px; text-align: right; font-weight: 600; color: var(--secondary-text); border-bottom: 1px solid var(--border-color); }
td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); text-align: right; font-variant-numeric: tabular-nums; }
th:first-child, td:first-child { text-align: left; }
tr.newest { background: #eff6ff; }

/* BADGES */
.badge { padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 0.8rem; }
.badge-up { background: #dcfce7; color: #166534; }
.badge-down { background: #fee2e2; color: #991b1b; }

/* FILTER BAR */
.filter-bar {
  display: none;
  background: white;
  padding: 1rem;
  border-radius: 12px;
  margin-bottom: 1rem;
  gap: 10px;
  border: 1px solid var(--border-color);
}
.filter-bar.show { display: flex; flex-wrap: wrap; }
.filter-bar input { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; outline: none; }

/* CHART STYLE */
.chart-wrapper {
  margin-top: 2rem;
  padding: 1.5rem;
  background: white;
  border-radius: 12px;
  border: 1px solid var(--border-color);
  box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

@media (max-width: 640px) {
  .grid { grid-template-columns: 1fr; }
}
/* ===== MOBILE ONLY (KHÔNG ẢNH HƯỞNG DESKTOP) ===== */
@media (max-width:600px){

  /* Ẩn nút Update trên header */
  header button{
    display:none;
  }

  /* Grid thành 2 cột */
  .grid{
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }

  /* Thu nhỏ card */
  .card{
    padding:10px;
  }

  .card-title{
    font-size:10px;
  }

  .card-value{
    font-size:18px;
  }

  /* Table nhỏ lại */
  th,td{
    font-size:12px;
    padding:6px;
  }

  /* Chart thấp lại */
  canvas{
    max-height:200px;
  }

}

/* ===== FLOAT UPDATE BUTTON ===== */
#fabUpdate{
  position:fixed;
  bottom:20px;
  right:20px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:#3b82f6;
  color:white;
  border:none;
  font-size:22px;
  box-shadow:0 6px 20px rgba(0,0,0,0.25);
  z-index:999;
  display:none;
}

/* Chỉ hiện trên mobile */
@media (max-width:600px){
  #fabUpdate{
    display:block;
  }
}
</style>
</head>
<body>

<header>
  <div class="brand">📊 XAU DASHBOARD</div>
  <button id="updateBtn" onclick="load()">UPDATE</button>
</header>

<div class="container">
  <div id="lastTime"></div>

  <div class="grid">
    <div class="card"><div class="card-title">💵 USD Exchange</div><div id="usd" class="card-value">--</div></div>
    <div class="card highlight"><div class="card-title">🌍 Global XAU (oz)</div><div id="xau" class="card-value">--</div></div>
    <div class="card highlight"><div class="card-title">🧈 SJC Gold </div><div id="sjc" class="card-value">--</div></div>
    <div class="card"><div class="card-title">⚖️ Market Gap</div><div id="diff" class="card-value">--</div></div>
    <div class="card"><div class="card-title">📊 DIFFERENCE %</div><div id="percent" class="card-value">--</div></div>
  </div>

  <div class="section-header">
    <div class="section-title">Query History</div>
    <button onclick="toggleView()" id="toggleBtn">+</button>
  </div>

  <div id="filterBox" class="filter-bar">
    <input type="date" id="filterDate">
    <input type="text" id="searchInput" placeholder="Search by time...">
    <button onclick="applyFilter()" style="background:#3b82f6; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Apply</button>
    <button onclick="resetFilter()" style="background:#94a3b8; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Reset</button>
    <button onclick="clearAll()" style="background:#ef4444; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; margin-left: auto;">Clear All</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>Update Time</th><th>XAU ($)</th><th>SJC (VND)</th><th>Gap (VND)</th><th>Status</th></tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>

  <div class="chart-wrapper">
    <div class="section-title" style="margin-bottom: 1rem;">📈 XAU-SJC Gap </div>
    <canvas id="gapChart" style="max-height: 400px;"></canvas>
  </div>
</div>

<script>
const API = "/api/gold";
const elements = {
  usd: document.getElementById("usd"),
  xau: document.getElementById("xau"),
  sjc: document.getElementById("sjc"),
  diff: document.getElementById("diff"),
  percent: document.getElementById("percent"),
  lastTime: document.getElementById("lastTime"),
  historyTable: document.getElementById("history"),
  filterBox: document.getElementById("filterBox"),
  updateBtn: document.getElementById("updateBtn"),
  toggleBtn: document.getElementById("toggleBtn")
};

const fmtVND = new Intl.NumberFormat('vi-VN');
const fmtXAU = new Intl.NumberFormat('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

let history = JSON.parse(localStorage.getItem("goldHistory") || "[]");
let chartData = JSON.parse(localStorage.getItem("goldChartData") || "[]");
let filteredData = [...history];
let myChart;
let isExpanded = false;

function initChart() {
  const ctx = document.getElementById('gapChart').getContext('2d');
  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: chartData.map(item => item.date),
      datasets: [{
        label: 'Gap (VND)',
        data: chartData.map(item => item.gap),
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59, 130, 246, 0.1)',
        borderWidth: 2,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { ticks: { callback: value => value.toLocaleString('vi-VN') } } }
    }
  });
}

function updateChartRecord(gap) {
  const now = new Date();
  const totalMinutes = now.getHours() * 60 + now.getMinutes();
  const todayKey = now.toLocaleDateString('vi-VN');
  if (totalMinutes >= 550 && totalMinutes <= 660) { // 9:10 - 11:00
    if (!chartData.find(item => item.date === todayKey)) {
      chartData.push({ date: todayKey, gap: gap });
      if (chartData.length > 30) chartData.shift();
      localStorage.setItem("goldChartData", JSON.stringify(chartData));
      myChart.data.labels = chartData.map(item => item.date);
      myChart.data.datasets[0].data = chartData.map(item => item.gap);
      myChart.update();
    }
  }
}

async function load() {
  elements.updateBtn.disabled = true;
  elements.updateBtn.innerText = "Updating...";
  try {
    const res = await fetch(`${API}?t=${Date.now()}`);
    const d = await res.json();
    const time = new Date().toLocaleString('vi-VN');
    const lastEntry = history[history.length - 1];
    if(!lastEntry || lastEntry.sjc !== d.sjc || lastEntry.xau !== d.xau) {
      history.push({ time, xau: d.xau, sjc: d.sjc, diff: d.diff, percent: d.percent });
      if(history.length > 100) history.shift();
      localStorage.setItem("goldHistory", JSON.stringify(history));
    }
    renderMain(d);
    updateChartRecord(d.diff);
    elements.lastTime.innerHTML = `🟢 Live Update: ${time}`;
    localStorage.setItem("lastData", JSON.stringify(d));
    localStorage.setItem("lastTime", time);
    filteredData = [...history];
    renderHistory();
  } catch(e) { alert("Error!"); } finally {
    elements.updateBtn.disabled = false;
    elements.updateBtn.innerText = "UPDATE";
  }
}

function renderMain(d) {
  elements.usd.innerText = fmtVND.format(d.usd);
  elements.xau.innerText = fmtXAU.format(d.xau);
  elements.diff.innerText = fmtVND.format(d.diff);
  elements.percent.innerText = d.percent;
  
  const key = "sjcMorning_" + new Date().toISOString().slice(0,10);
  let morning = localStorage.getItem(key) || localStorage.setItem(key, d.sjc) || d.sjc;
  const change = d.sjc - parseFloat(morning);
  const isUp = change >= 0;
  elements.sjc.innerHTML = `<div>${fmtVND.format(d.sjc)}</div><div class="sjc-sub ${isUp ? 'change-up' : 'change-down'}">${isUp ? '▲' : '▼'} ${fmtVND.format(Math.abs(change))}</div>`;
}

function renderHistory() {
  elements.historyTable.innerHTML = "";
  let data = [...filteredData].reverse();
  if(!isExpanded) data = data.slice(0, 5);
  data.forEach((r, i) => {
    const row = document.createElement("tr");
    if(i === 0 && !isExpanded) row.className = "newest";
    row.innerHTML = `<td>${r.time}</td><td>${fmtXAU.format(r.xau)}</td><td>${fmtVND.format(r.sjc)}</td><td>${fmtVND.format(r.diff)}</td><td><span class="badge ${r.percent.includes('-') ? 'badge-down' : 'badge-up'}">${r.percent}</span></td>`;
    elements.historyTable.appendChild(row);
  });
}

function toggleView() {
  isExpanded = !isExpanded;
  elements.toggleBtn.innerText = isExpanded ? "−" : "+";
  elements.filterBox.classList.toggle("show", isExpanded);
  renderHistory();
}

function applyFilter() {
  const date = document.getElementById("filterDate").value;
  const key = document.getElementById("searchInput").value.toLowerCase();
  filteredData = history.filter(r => (!date || r.time.includes(date)) && (!key || r.time.toLowerCase().includes(key)));
  renderHistory();
}

function resetFilter() {
  document.getElementById("filterDate").value = "";
  document.getElementById("searchInput").value = "";
  filteredData = [...history];
  renderHistory();
}

function clearAll() {
  if(confirm("Clear all?")) {
    localStorage.clear();
    location.reload();
  }
}

initChart();
const lastData = localStorage.getItem("lastData");
if(lastData) renderMain(JSON.parse(lastData));
const lastTimeSaved = localStorage.getItem("lastTime");
elements.lastTime.innerHTML = lastTimeSaved ? `⚪ Last update: ${lastTimeSaved}` : "Ready";
renderHistory();
</script>
<button id="fabUpdate" onclick="load()">🔄</button>
</body>
</html>
