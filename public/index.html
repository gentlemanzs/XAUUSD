<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAU Dashboard</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #f8fafc;
}

header {
  background: #374151;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 80px 15px 30px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.toggle-btn {
  cursor: pointer;
  font-size: 20px;
}
</style>
</head>

<body>

<header>
  <div>XAU Dashboard</div>
  <button onclick="load()">UPDATE</button>
</header>

<div class="container">

  <div class="card">
    <div>USD: <span id="usd"></span></div>
    <div>XAU: <span id="xau"></span></div>
    <div>SJC: <span id="sjc"></span></div>
    <div>Diff: <span id="diff"></span></div>
  </div>

  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h3>Query History</h3>
    <div class="toggle-btn" onclick="toggleHistory()" id="toggleBtn">+</div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>SJC</th>
          <th>Diff</th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>

</div>

<script>
const API = "/api/gold";
const HIST = "/api/history";

let historyData = [];
let showAll = false;

async function load() {
  const res = await fetch(API);
  const d = await res.json();

  document.getElementById("usd").innerText = d.usd;
  document.getElementById("xau").innerText = d.xau;
  document.getElementById("sjc").innerText = d.sjc;
  document.getElementById("diff").innerText = d.diff;

  fetchHistory();
}

async function fetchHistory() {
  const res = await fetch(HIST);
  historyData = await res.json();
  renderHistory();
}

function renderHistory() {
  const tbody = document.getElementById("history");
  tbody.innerHTML = "";

  let data = [...historyData].reverse();

  if (!showAll) {
    data = data.slice(0, 5);
  }

  data.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${r.time}</td>
      <td>${r.sjc}</td>
      <td>${r.diff}</td>
    `;
    tbody.appendChild(tr);
  });
}

function toggleHistory() {
  showAll = !showAll;
  document.getElementById("toggleBtn").innerText = showAll ? "−" : "+";
  renderHistory();
}

load();
</script>

</body>
</html>
