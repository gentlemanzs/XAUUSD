<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XAU Professional Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
<style>
:root { 
  --bg-color: #f8fafc; 
  --header-cyber: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); 
  --card-bg: #ffffff; 
  --primary-text: #1e293b; 
  --secondary-text: #64748b; 
  --up-color: #10b981; 
  --down-color: #ef4444; 
  --border-color: #e2e8f0; 
  --accent-color: #3b82f6; 
}

body { 
  margin: 0; font-family: 'Inter', -apple-system, system-ui, sans-serif; 
  background: var(--bg-color); color: var(--primary-text); 
  overflow-x: hidden; overscroll-behavior-y: contain; 
}

.header {
  background: var(--header-cyber); color: white;
  padding: 24px 20px; text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  position: relative; overflow: hidden;
}
.header::after {
  content: ''; position: absolute; top: 0; left: -100%;
  width: 50%; height: 100%;
  background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
  animation: sweep 4s infinite;
}
@keyframes sweep { 0% { left: -100%; } 100% { left: 200%; } }
.header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: 1px; }
.header p { margin: 8px 0 0; font-size: 13px; color: #cbd5e1; opacity: 0.9; }

.container { padding: 20px; max-width: 1200px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
.card {
  background: var(--card-bg); border-radius: 16px; padding: 24px;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.02);
  border: 1px solid var(--border-color);
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08); }
.card-title { font-size: 14px; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 12px; }
.card-value { font-size: 32px; font-weight: 800; color: var(--primary-text); display: flex; align-items: baseline; gap: 8px; }
.card-value.highlight { color: var(--accent-color); }
.sjc-sub { font-size: 14px; padding: 4px 8px; border-radius: 6px; font-weight: 600; }
.change-up { background: rgba(16, 185, 129, 0.1); color: var(--up-color); }
.change-down { background: rgba(239, 68, 68, 0.1); color: var(--down-color); }

.chart-container {
  background: var(--card-bg); border-radius: 16px; padding: 24px; margin-bottom: 24px;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border-color);
}
.chart-scroll-container {
  width: 100%; overflow-x: auto; overflow-y: hidden;
  scrollbar-width: thin; scrollbar-color: var(--accent-color) var(--border-color);
  border-radius: 8px;
}
.chart-scroll-container::-webkit-scrollbar { height: 6px; }
.chart-scroll-container::-webkit-scrollbar-track { background: var(--border-color); border-radius: 4px; }
.chart-scroll-container::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 4px; }

/* Wrapper cho biểu đồ kéo dài */
.chart-inner-wrapper { position: relative; height: 350px; }

.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.section-title { font-size: 18px; font-weight: 700; color: var(--primary-text); display: flex; align-items: center; gap: 8px; }
.btn-toggle {
  background: var(--bg-color); border: 1px solid var(--border-color); color: var(--primary-text);
  width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-weight: bold;
  display: flex; align-items: center; justify-content: center; transition: 0.2s;
}
.btn-toggle:hover { background: var(--border-color); }

.filter-box {
  display: none; flex-wrap: wrap; gap: 12px; background: var(--bg-color);
  padding: 16px; border-radius: 12px; margin-bottom: 16px; border: 1px solid var(--border-color);
}
.filter-box input {
  padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px;
  font-family: inherit; font-size: 14px; outline: none; background: var(--card-bg);
}
.filter-box input:focus { border-color: var(--accent-color); }
.btn {
  padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px;
}
.btn-primary { background: var(--accent-color); color: white; }
.btn-primary:hover { background: #2563eb; }
.btn-danger { background: #fee2e2; color: var(--down-color); border: 1px solid #fca5a5; }
.btn-danger:hover { background: #fecaca; }

.table-wrapper { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
table { width: 100%; border-collapse: collapse; text-align: right; }
th, td { padding: 16px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
th { background: #f8fafc; color: var(--secondary-text); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: 12px; position: sticky; top: 0; z-index: 10; }
th:first-child, td:first-child { text-align: left; }
tr:hover { background: #f1f5f9; }
.badge { padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 13px; display: inline-block; }
.badge-up { background: rgba(16, 185, 129, 0.1); color: var(--up-color); }
.badge-down { background: rgba(239, 68, 68, 0.1); color: var(--down-color); }
input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--down-color); cursor: pointer; }

.pagination { display: flex; justify-content: center; gap: 8px; padding: 20px; background: var(--card-bg); border-top: 1px solid var(--border-color); }
.page-btn {
  padding: 8px 14px; border: 1px solid var(--border-color); background: white;
  border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--secondary-text); transition: 0.2s;
}
.page-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
.page-btn:hover:not(.active):not(:disabled) { background: #f1f5f9; }
.page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Tối ưu Mobile */
@media (max-width: 640px) {
  .header { padding: 20px 16px; }
  .header h1 { font-size: 20px; }
  .container { padding: 12px; }
  .card { padding: 16px; }
  .card-value { font-size: 24px; }
  .filter-box { flex-direction: column; }
  .filter-box input, .filter-box button { width: 100%; box-sizing: border-box; }
  th, td { padding: 12px 8px; font-size: 13px; }
  .badge { font-size: 12px; padding: 2px 6px; }
  .chart-inner-wrapper { 
    height: 280px !important; 
    /* ĐÃ XÓA min-width: 100% ĐỂ BIỂU ĐỒ TRƯỢT ĐƯỢC */
  }
}
</style>
</head>
<body>
<div class="header">
  <h1>XAU PRO DASHBOARD</h1>
  <p id="lastTime">Đang kết nối...</p>
</div>

<div class="container">
  <div class="grid">
    <div class="card">
      <div class="card-title">💵 Tỷ Giá USD (VCB)</div>
      <div class="card-value" id="usd">--</div>
    </div>
    <div class="card">
      <div class="card-title">🌍 Vàng TG (USD/oz)</div>
      <div class="card-value" id="xau">--</div>
    </div>
    <div class="card" style="border: 2px solid var(--accent-color);">
      <div class="card-title">🇻🇳 Vàng SJC (VND/Lượng)</div>
      <div class="card-value" id="sjc" style="flex-direction: column; align-items: flex-start; gap: 4px;">--</div>
    </div>
  </div>

  <div class="chart-container">
    <div class="section-header">
      <div class="section-title">📉 Biểu Đồ Chênh Lệch (Gap)</div>
      <div style="font-size: 20px; font-weight: 800; color: var(--accent-color);" id="diff">--</div>
    </div>
    <div class="chart-scroll-container">
      <div class="chart-inner-wrapper">
        <canvas id="gapChart"></canvas>
      </div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">
      <button class="btn-toggle" id="toggleBtn" onclick="toggleFilterBox()">+</button>
      Lịch Sử Biến Động
    </div>
    <button class="btn btn-primary" id="updateBtn">Làm Mới (F5)</button>
  </div>

  <div class="filter-box" id="filterBox">
    <input type="date" id="startDate" placeholder="Từ ngày">
    <input type="date" id="endDate" placeholder="Đến ngày">
    <button class="btn btn-primary" onclick="applyFilter()">Lọc</button>
    <button class="btn btn-danger" onclick="deleteSelected()" style="margin-left: auto;">Xóa Chọn</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Thời gian</th><th>XAU</th><th>SJC</th><th>Gap</th><th>% Gap</th>
          <th class="col-action" style="display: none; text-align: center;" id="actionHeader">
            <input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)">
          </th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
    <div class="pagination" id="pagination" style="display: none;"></div>
  </div>
</div>

<script>
const API = "/api/gold";
const HIST_API = "/api/history"; 
const elements = {
  usd: document.getElementById("usd"), xau: document.getElementById("xau"),
  sjc: document.getElementById("sjc"), diff: document.getElementById("diff"),
  lastTime: document.getElementById("lastTime"),
  historyTable: document.getElementById("history"), filterBox: document.getElementById("filterBox"),
  startDate: document.getElementById("startDate"), endDate: document.getElementById("endDate"), toggleBtn: document.getElementById("toggleBtn"),
  actionHeader: document.getElementById("actionHeader"), pagination: document.getElementById("pagination")
};

const fmtVND = new Intl.NumberFormat('vi-VN');
const fmtXAU = new Intl.NumberFormat('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

let historyData = []; 
let currentData = []; 
let lastSJCValue = null; 
let myChart = null;
let isExpanded = false; 
let currentPage = 1;

/* ===== NHẬN REALTIME (SSE) & TỐI ƯU GHI THẲNG VÀO RAM WEB ===== */
const evtSource = new EventSource("/api/stream");
evtSource.onmessage = (event) => {
  const d = JSON.parse(event.data);
  if (!d || Object.keys(d).length === 0) return;
  
  elements.lastTime.style.color = "#10b981";
  setTimeout(() => elements.lastTime.style.color = "#cbd5e1", 2000);
  
  renderMain(d);

  if (lastSJCValue === null) {
    lastSJCValue = d.sjc;
    fetchHistory();
  } else if (d.sjc !== lastSJCValue) {
    lastSJCValue = d.sjc;
    // TỐI ƯU CỰC MẠNH: Thêm phần tử vào đầu mảng thay vì tốn mạng gọi API tải lại
    historyData.unshift({
        createdAt: d.updatedAt, xau: d.xau, sjc: d.sjc, diff: d.diff, percent: d.percent,
        _id: "temp_" + Date.now()
    });
    if (historyData.length > 100) historyData.pop(); 
    applyFilter(); // Tự động vẽ lại bảng và biểu đồ
  }
};

/* ===== TẢI LẦN ĐẦU / ÉP TẢI ===== */
async function load(isForce = false) {
  try {
    const forceParam = isForce ? "&force=true" : "";
    const res = await fetch(`${API}?t=${Date.now()}${forceParam}`);
    const d = await res.json();
    if (!d || Object.keys(d).length === 0) return;
    renderMain(d);
    
    if (lastSJCValue === null) {
      lastSJCValue = d.sjc;
      await fetchHistory();
    }
  } catch(e) { console.error(e); }
}

function renderMain(d) {
  elements.usd.innerText = fmtVND.format(d.usd);
  elements.xau.innerText = fmtXAU.format(d.xau);
  elements.diff.innerText = fmtVND.format(d.diff) + " ₫ (" + d.percent + ")";
  
  const key = "sjcMorning_" + new Date().toISOString().slice(0,10);
  let morning = localStorage.getItem(key) || localStorage.setItem(key, d.sjc) || d.sjc;
  const change = d.sjc - parseFloat(morning);
  const isUp = change >= 0;
  
  elements.sjc.innerHTML = `<div>${fmtVND.format(d.sjc)}</div><div class="sjc-sub ${isUp ? 'change-up' : 'change-down'}">${isUp ? '▲' : '▼'} ${fmtVND.format(Math.abs(change))}</div>`;
  const updateTime = new Date(d.updatedAt);
  const timeStr = isNaN(updateTime) ? new Date().toLocaleTimeString('vi-VN') : updateTime.toLocaleTimeString('vi-VN');
  elements.lastTime.innerHTML = `${d.status === "Delayed" ? "🟡 Tạm thời" : "🟢 Live"} - ${timeStr}`;
}

async function fetchHistory() {
  try {
    const res = await fetch(HIST_API);
    historyData = await res.json(); 
    applyFilter();
  } catch(e) { console.error(e); }
}

function formatVNDateTime(isoString) {
  const d = new Date(isoString);
  if (isNaN(d)) return "--";
  return d.toLocaleString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh', day: '2-digit', month: '2-digit', hour: '2-digit', minute:'2-digit' });
}

function renderTable() {
  elements.historyTable.innerHTML = "";
  const pageSize = isExpanded ? 20 : 10;
  const startIdx = isExpanded ? (currentPage - 1) * pageSize : 0;
  const endIdx = startIdx + pageSize;
  const displayData = currentData.slice(startIdx, endIdx);
  const displayStyle = isExpanded ? "table-cell" : "none";
  document.getElementById('selectAll').checked = false;
  
  displayData.forEach(r => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${formatVNDateTime(r.createdAt)}</td>
      <td>${fmtXAU.format(r.xau)}</td>
      <td>${fmtVND.format(r.sjc)}</td>
      <td>${fmtVND.format(r.diff)}</td>
      <td><span class="badge ${r.percent.includes('-') ? 'badge-down' : 'badge-up'}">${r.percent}</span></td>
      <td class="col-action" style="display: ${displayStyle}; text-align: center;">
        <input type="checkbox" class="log-checkbox" value="${r._id}">
      </td>
    `;
    elements.historyTable.appendChild(row);
  });
  renderPagination();
}

function renderPagination() {
  const pag = elements.pagination;
  if (!isExpanded || currentData.length <= 20) { pag.style.display = "none"; return; }
  pag.style.display = "flex"; pag.innerHTML = "";
  const totalPages = Math.ceil(currentData.length / 20);
  
  const prevBtn = document.createElement("button");
  prevBtn.className = "page-btn"; prevBtn.innerText = "«";
  prevBtn.disabled = currentPage === 1;
  prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; renderTable(); } };
  pag.appendChild(prevBtn);
  
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, startPage + 4);
  for (let i = startPage; i <= endPage; i++) {
    const btn = document.createElement("button");
    btn.className = `page-btn ${i === currentPage ? "active" : ""}`; btn.innerText = i;
    btn.onclick = () => { currentPage = i; renderTable(); };
    pag.appendChild(btn);
  }
  
  const nextBtn = document.createElement("button");
  nextBtn.className = "page-btn"; nextBtn.innerText = "»";
  nextBtn.disabled = currentPage === totalPages;
  nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; renderTable(); } };
  pag.appendChild(nextBtn);
}

function toggleFilterBox() {
  isExpanded = !isExpanded;
  elements.filterBox.style.display = isExpanded ? "flex" : "none";
  elements.toggleBtn.innerText = isExpanded ? "−" : "+";
  elements.actionHeader.style.display = isExpanded ? "table-cell" : "none";
  currentPage = 1;
  renderTable();
}

function applyFilter() {
  const startStr = elements.startDate.value;
  const endStr = elements.endDate.value;
  
  currentData = (!startStr && !endStr) ? [...historyData] : historyData.filter(r => {
    const d = new Date(r.createdAt);
    if(isNaN(d)) return false;
    const formatted = d.toLocaleDateString('en-CA', { timeZone: 'Asia/Ho_Chi_Minh' }); 
    if(startStr && formatted < startStr) return false;
    if(endStr && formatted > endStr) return false;
    return true;
  });
  
  currentPage = 1; 
  renderTable(); 
  updateChart(currentData);
}

function toggleSelectAll(source) {
  document.querySelectorAll('.log-checkbox').forEach(cb => cb.checked = source.checked);
}

async function deleteSelected() {
  const checkedBoxes = document.querySelectorAll('.log-checkbox:checked');
  if (checkedBoxes.length === 0) return;
  if (!confirm(`Xóa ${checkedBoxes.length} bản ghi?`)) return;
  const ids = Array.from(checkedBoxes).map(cb => cb.value);
  try {
    const res = await fetch('/api/history/bulk-delete', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: ids })
    });
    if (res.ok) { lastSJCValue = null; await load(); }
  } catch(e) {}
}

/* ===== BIỂU ĐỒ (TỐI ƯU GIAO DIỆN & TRƯỢT NGANG 10 ĐIỂM) ===== */
function updateChart(data) {
  // Nếu Chart.js chưa tải xong qua defer, đợi 100ms thử lại
  if (typeof Chart === 'undefined') {
    setTimeout(() => updateChart(data), 100);
    return;
  }
  
  const chartCanvas = document.getElementById('gapChart');
  const ctx = chartCanvas.getContext('2d');
  const reversedData = [...data].reverse();
  const totalPoints = reversedData.length;

  // Tính chiều rộng 10 điểm = 100% màn hình
  const pointsOnScreen = 10;
  const dynamicWidth = Math.max(100, (totalPoints / pointsOnScreen) * 100);
  
  // ÉP BUỘC CHIỀU RỘNG CHART ĐỂ TẠO THANH CUỘN (Tối ưu Mobile)
  const wrapper = chartCanvas.parentElement;
  wrapper.style.setProperty('width', dynamicWidth + '%', 'important');
  wrapper.style.setProperty('min-width', dynamicWidth + '%', 'important');

  const labels = reversedData.map(r => {
    const d = new Date(r.createdAt);
    if (isNaN(d)) return '';
    return [
      d.toLocaleTimeString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh', hour: '2-digit', minute: '2-digit' }),
      d.toLocaleDateString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh', day: '2-digit', month: '2-digit' })
    ];
  });
  const gaps = reversedData.map(r => r.diff / 1000000);

  if (myChart) {
    myChart.data.labels = labels;
    myChart.data.datasets[0].data = gaps;
    myChart.update();
  } else {
    myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          data: gaps,
          borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)',
          borderWidth: 2, fill: true, tension: 0.3, pointRadius: 4, hitRadius: 20
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: {
            beginAtZero: false,
            ticks: {
              maxTicksLimit: 6, // Chỉ hiện tối đa 6 mốc giá để không bị rối mắt
              callback: val => val.toFixed(1) + 'M',
              color: '#64748b', font: { size: 11, weight: '600' }
            },
            grid: { color: 'rgba(226, 232, 240, 0.6)' }
          },
          x: {
            ticks: { autoSkip: false, color: '#64748b', font: { size: 9 }, maxRotation: 0 },
            grid: { display: false }
          }
        }
      }
    });
  }
  
  // Tự động kéo thanh cuộn về điểm mới nhất
  const scroller = document.querySelector('.chart-scroll-container');
  setTimeout(() => { scroller.scrollLeft = scroller.scrollWidth; }, 150);
}

document.getElementById("updateBtn").onclick = () => load(true);

/* ===== PULL TO REFRESH ===== */
const style = document.createElement('style');
style.innerHTML = `
  .cyber-pull-container {
    position: fixed; top: -80px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 15px;
    background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
    padding: 12px 24px; border-radius: 40px; border: 1px solid rgba(59, 130, 246, 0.3);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); z-index: 9999;
    transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s, box-shadow 0.3s;
    pointer-events: none;
  }
  .cyber-pull-container.ready { border-color: rgba(16, 185, 129, 0.8); box-shadow: 0 0 25px rgba(16, 185, 129, 0.2); }
  .pulse-bars { display: flex; gap: 4px; align-items: flex-end; height: 24px; }
  .pulse-bar { width: 5px; height: 4px; border-radius: 2px; background: #3b82f6; transition: background 0.3s; }
  .cyber-pull-container.ready .pulse-bar { background: #10b981; }
  .cyber-pull-container.refreshing .pulse-bar { background: #10b981; animation: pulseWave 0.5s ease-in-out infinite alternate; }
  .cyber-pull-container.refreshing .pulse-bar:nth-child(1) { animation-delay: 0.0s; }
  .cyber-pull-container.refreshing .pulse-bar:nth-child(2) { animation-delay: 0.1s; }
  .cyber-pull-container.refreshing .pulse-bar:nth-child(3) { animation-delay: 0.2s; }
  .cyber-pull-container.refreshing .pulse-bar:nth-child(4) { animation-delay: 0.3s; }
  @keyframes pulseWave { 0% { height: 4px; } 100% { height: 24px; box-shadow: 0 0 10px #10b981; } }
  .cyber-text { color: #94a3b8; font-size: 14px; font-weight: 600; transition: color 0.3s; }
  .cyber-pull-container.ready .cyber-text { color: #10b981; text-shadow: 0 0 8px rgba(16,185,129,0.4); }
`;
document.head.appendChild(style);

const pullContainer = document.createElement("div");
pullContainer.className = "cyber-pull-container";
pullContainer.innerHTML = `
  <div class="pulse-bars">
    <div class="pulse-bar" id="bar1"></div><div class="pulse-bar" id="bar2"></div>
    <div class="pulse-bar" id="bar3"></div><div class="pulse-bar" id="bar4"></div>
  </div>
  <div class="cyber-text">Đồng bộ...</div>
`;
document.body.appendChild(pullContainer);

let startY = 0, isPulling = false, isRefreshing = false;
const pullThreshold = 120, textEl = pullContainer.querySelector('.cyber-text');
const bars = [ document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4') ];
const targetHeights = [12, 24, 16, 20]; 

window.addEventListener("touchstart", (e) => { 
  if (window.scrollY <= 0 && !isRefreshing) { startY = e.touches[0].clientY; isPulling = true; } 
}, { passive: false });

window.addEventListener("touchmove", (e) => {
  if (!isPulling || isRefreshing) return;
  const diff = e.touches[0].clientY - startY;
  if (diff > 0 && window.scrollY <= 0) {
    if (e.cancelable) e.preventDefault();
    pullContainer.style.top = `${-80 + Math.min(diff * 0.4, 90)}px`;
    const pullRatio = Math.min(diff / pullThreshold, 1);
    bars.forEach((bar, index) => bar.style.height = `${4 + (targetHeights[index] - 4) * pullRatio}px`);
    if (diff > pullThreshold) { pullContainer.classList.add('ready'); textEl.innerText = "Thả tay để tải mới!"; } 
    else { pullContainer.classList.remove('ready'); textEl.innerText = "Kéo thêm chút nữa..."; }
  }
}, { passive: false });

window.addEventListener("touchend", (e) => {
  if (!isPulling || isRefreshing) return;
  isPulling = false;
  const diff = e.changedTouches[0].clientY - startY;
  bars.forEach(bar => bar.style.height = '');
  if (diff > pullThreshold) {
    isRefreshing = true;
    pullContainer.classList.remove('ready'); pullContainer.classList.add('refreshing');
    pullContainer.style.top = "20px"; textEl.innerText = "Updating...";
    
    load(true).then(() => {
      textEl.innerText = "Success!";
      pullContainer.classList.remove('refreshing'); pullContainer.classList.add('ready');
      bars.forEach((bar, idx) => bar.style.height = `${targetHeights[idx]}px`);
      setTimeout(() => { 
        pullContainer.style.top = "-80px"; 
        setTimeout(() => { isRefreshing = false; pullContainer.classList.remove('ready'); }, 300);
      }, 1000);
    });
  } else { pullContainer.style.top = "-80px"; }
});

// Chạy lần đầu khi mở web
window.addEventListener('DOMContentLoaded', () => load(true));
</script>
</body>
</html>
